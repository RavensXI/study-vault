<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Pipeline - StudyVault Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .pipeline-layout { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .pipeline-header { margin-bottom: 2rem; }
    .pipeline-header h1 { font-family: 'Source Serif 4', serif; font-size: 1.75rem; margin: 0 0 0.35rem; }
    .pipeline-header p { color: var(--text-muted); font-size: 0.875rem; margin: 0; }

    /* Upload form */
    .upload-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .upload-card h2 { font-family: 'Source Serif 4', serif; font-size: 1.2rem; margin: 0 0 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group.full-width { grid-column: 1 / -1; }
    .form-group label { font-size: 0.82rem; font-weight: 600; color: var(--text-color); }
    .form-group input, .form-group select { padding: 0.55rem 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.875rem; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.15); }

    .dropzone { border: 2px dashed #ddd; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 1.25rem; }
    .dropzone:hover, .dropzone.dragover { border-color: #7c3aed; background: #f5f3ff; }
    .dropzone p { margin: 0; color: var(--text-muted); font-size: 0.875rem; }
    .dropzone .file-name { font-weight: 600; color: var(--text-color); margin-top: 0.5rem; }
    .dropzone input[type="file"] { display: none; }

    .color-row { display: flex; gap: 1rem; align-items: flex-end; }
    .color-row .form-group { flex: 1; }
    .color-row input[type="color"] { height: 40px; padding: 2px; border-radius: 8px; cursor: pointer; }

    .btn { padding: 0.6rem 1.5rem; border-radius: 10px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-success { background: #16a34a; color: white; }
    .btn-success:hover:not(:disabled) { background: #15803d; }
    .btn-outline { background: transparent; border: 1px solid #ddd; color: var(--text-color); }
    .btn-outline:hover:not(:disabled) { background: #f9fafb; }

    /* Plan review */
    .plan-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 1px 8px rgba(0,0,0,0.06); margin-bottom: 1rem; }
    .plan-card h2 { font-family: 'Source Serif 4', serif; font-size: 1.2rem; margin: 0 0 1rem; }
    .unit-block { margin-bottom: 1.5rem; }
    .unit-block h3 { font-size: 0.95rem; font-weight: 700; margin: 0 0 0.5rem; padding-bottom: 0.4rem; border-bottom: 2px solid #e5e7eb; }
    .lesson-list { list-style: none; padding: 0; margin: 0; }
    .lesson-list li { padding: 0.4rem 0; font-size: 0.875rem; color: var(--text-color); display: flex; gap: 0.5rem; }
    .lesson-list .lesson-num { font-weight: 700; color: var(--text-muted); min-width: 2rem; }

    /* Progress grid */
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .progress-bar-outer { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-bar-inner { height: 100%; background: #16a34a; border-radius: 4px; transition: width 0.3s; }
    .progress-stats { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.75rem; }

    .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; }
    .lesson-card { background: white; border-radius: 12px; padding: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); border-left: 3px solid #e5e7eb; }
    .lesson-card.done { border-left-color: #16a34a; }
    .lesson-card.in-progress { border-left-color: #f59e0b; }
    .lesson-card.error { border-left-color: #dc2626; }
    .lesson-card h4 { font-size: 0.82rem; font-weight: 600; margin: 0 0 0.25rem; }
    .lesson-card .lesson-meta { font-size: 0.72rem; color: var(--text-muted); }
    .lesson-card .status-icon { float: right; font-size: 1rem; }

    /* Status indicators */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f59e0b; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .phase-badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .phase-uploaded { background: #f3f4f6; color: #6b7280; }
    .phase-parsing { background: #fef3c7; color: #92400e; }
    .phase-parsed { background: #dbeafe; color: #1d4ed8; }
    .phase-planning { background: #fef3c7; color: #92400e; }
    .phase-planned { background: #dbeafe; color: #1d4ed8; }
    .phase-generating { background: #fef3c7; color: #92400e; }
    .phase-complete { background: #d1fae5; color: #065f46; }
    .phase-failed { background: #fee2e2; color: #dc2626; }

    .error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 0.75rem 1rem; color: #dc2626; font-size: 0.82rem; margin: 1rem 0; }
    .info-msg { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 0.75rem 1rem; color: #1d4ed8; font-size: 0.82rem; margin: 1rem 0; }

    .done-section { text-align: center; padding: 2rem; }
    .done-section h2 { font-family: 'Source Serif 4', serif; color: #16a34a; }
    .done-links { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
  </style>
</head>
<body>

    <div class="page-header-inner">
      <a href="/" class="header-brand">

      </a>
      <nav class="header-nav">
        <a href="/">Dashboard</a>

    </div>
  </header>

  <div class="pipeline-layout" id="pipeline-app">
    <div class="pipeline-header">
      <h1>Content Generation Pipeline</h1>
      <p>Upload teacher resources and generate revision lessons automatically.</p>
    </div>
    <div id="pipeline-content">Loading...</div>
  </div>

  <script>
  (function () {
    'use strict';

    var sb = window.supabase.createClient(
      'https://baipckgywpnwapobwtsy.supabase.co',
      'sb_publishable_PYj2nvjclOsUWmZPolhRuA_1OvYhnc2'
    );

    var contentEl = document.getElementById('pipeline-content');
    var accessToken = null;
    var demoUser = null;
    var currentJob = null;
    var pollTimer = null;

    // ---- Auth ----
    async function init() {
      // 1. Try Supabase SSO session
      var result = await sb.auth.getSession();
      if (result.data.session) {
        accessToken = result.data.session.access_token;
      } else {
        // 2. Try demo user from localStorage
        try {
          var stored = localStorage.getItem('studyvault-user');
          if (stored) {
            var u = JSON.parse(stored);
            if (u && u.isDemo && u.id) {
              demoUser = u.id;
            }
          }
        } catch (e) {}
      }

      if (!accessToken && !demoUser) {
        contentEl.innerHTML = '<div class="error-msg">Not logged in. <a href="/">Go to login</a> first, then come back here.</div>';
        return;
      }

      // Check for existing jobs via API (bypasses RLS for demo users)
      try {
        var jobsResult = await apiCall('/api/pipeline/status?latest=1');
        if (jobsResult.job) {
          currentJob = jobsResult.job;
          await resumeJob(currentJob);
          return;
        }
      } catch (e) {}
      renderUploadForm();
    }

    // ---- API helper ----
    async function apiCall(endpoint, body) {
      var headers = { 'Content-Type': 'application/json' };
      if (accessToken) {
        headers['Authorization'] = 'Bearer ' + accessToken;
      } else if (demoUser) {
        headers['X-Demo-User'] = demoUser;
      }
      var opts = { headers: headers };
      if (body !== undefined) {
        opts.method = 'POST';
        opts.body = JSON.stringify(body);
      }
      var resp = await fetch(endpoint, opts);
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error || data.detail || 'API error');
      return data;
    }

    // ---- Resume an in-progress job ----
    async function resumeJob(job) {
      var phase = job.current_phase;
      if (phase === 'uploaded') {
        renderReadyToParse(job);
      } else if (phase === 'parsed') {
        renderReadyForGeneration(job);
      } else if (phase === 'planned' || phase === 'generating' || phase === 'complete') {
        renderProgress(job);
      }
    }

    // ---- Upload Form ----
    function renderUploadForm() {
      var selectedFiles = [];

      contentEl.innerHTML =
        '<div class="upload-card">' +
          '<h2>Upload Teaching Resources</h2>' +
          '<p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:1rem">Upload PPTs, Word docs, and PDFs. Select multiple files or drag a folder.</p>' +
          '<div class="dropzone" id="dropzone">' +
            '<p>Drag and drop files or a folder here, or click to browse</p>' +
            '<input type="file" id="file-input" multiple>' +
          '</div>' +
          '<div class="form-grid">' +
            '<div class="form-group"><label>Subject Name</label><input type="text" id="subject-name" placeholder="e.g. Drama"></div>' +
            '<div class="form-group"><label>Spec Code</label><input type="text" id="spec-code" placeholder="e.g. J316"></div>' +
            '<div class="form-group"><label>Exam Board</label>' +
              '<select id="exam-board"><option value="OCR">OCR</option><option value="AQA">AQA</option><option value="Edexcel">Edexcel</option><option value="WJEC">WJEC</option></select>' +
            '</div>' +
            '<div class="form-group"><label>Unit Colour</label><input type="color" id="color1" value="#7c3aed"></div>' +
          '</div>' +
          '<button class="btn btn-primary" id="upload-btn" disabled>Upload &amp; Parse</button>' +
        '</div>';

      var dropzone = document.getElementById('dropzone');
      var fileInput = document.getElementById('file-input');
      var uploadBtn = document.getElementById('upload-btn');

      function updateDropzoneDisplay() {
        if (selectedFiles.length === 0) return;
        var totalKB = 0;
        for (var i = 0; i < selectedFiles.length; i++) totalKB += selectedFiles[i].size;
        var names = selectedFiles.map(function (f) { return f.name; });
        var display = names.length <= 5 ? names.join(', ') : names.slice(0, 5).join(', ') + ' + ' + (names.length - 5) + ' more';
        dropzone.innerHTML = '<p class="file-name">' + selectedFiles.length + ' file(s) selected</p><p style="font-size:0.75rem;color:var(--text-muted)">' + display + '</p><p>' + (totalKB / 1024).toFixed(0) + ' KB total</p>';
        uploadBtn.disabled = !document.getElementById('subject-name').value;
      }

      function collectFiles(fileList) {
        selectedFiles = [];
        for (var i = 0; i < fileList.length; i++) {
          var f = fileList[i];
          var ext = f.name.split('.').pop().toLowerCase();
          if (['pptx', 'ppt', 'docx', 'doc', 'pdf', 'txt'].includes(ext)) {
            selectedFiles.push(f);
          }
        }
        updateDropzoneDisplay();
      }

      // Folder drop support — recursively read directory entries
      async function getFilesFromDrop(dataTransfer) {
        var files = [];
        var items = dataTransfer.items;
        if (!items) { return Array.from(dataTransfer.files); }

        var promises = [];
        for (var i = 0; i < items.length; i++) {
          var entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
          if (entry) {
            promises.push(readEntry(entry, files));
          } else if (items[i].getAsFile) {
            files.push(items[i].getAsFile());
          }
        }
        await Promise.all(promises);
        return files;
      }

      function readEntry(entry, files) {
        return new Promise(function (resolve) {
          if (entry.isFile) {
            entry.file(function (f) { files.push(f); resolve(); });
          } else if (entry.isDirectory) {
            var reader = entry.createReader();
            reader.readEntries(function (entries) {
              Promise.all(entries.map(function (e) { return readEntry(e, files); })).then(resolve);
            });
          } else {
            resolve();
          }
        });
      }

      dropzone.addEventListener('click', function () { fileInput.click(); });
      dropzone.addEventListener('dragover', function (e) { e.preventDefault(); dropzone.classList.add('dragover'); });
      dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('dragover'); });
      dropzone.addEventListener('drop', async function (e) {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        dropzone.innerHTML = '<p>Reading files...</p>';
        var allFiles = await getFilesFromDrop(e.dataTransfer);
        collectFiles(allFiles);
      });
      fileInput.addEventListener('change', function () {
        collectFiles(fileInput.files);
      });
      document.getElementById('subject-name').addEventListener('input', function () {
        uploadBtn.disabled = !this.value || selectedFiles.length === 0;
      });

      uploadBtn.addEventListener('click', async function () {
        if (selectedFiles.length === 0) return;
        uploadBtn.disabled = true;

        try {
          var jobPrefix = crypto.randomUUID();
          var filenames = [];

          // Upload each file
          for (var i = 0; i < selectedFiles.length; i++) {
            uploadBtn.textContent = 'Uploading ' + (i + 1) + '/' + selectedFiles.length + '...';
            var f = selectedFiles[i];
            var storagePath = jobPrefix + '/' + f.name;
            var uploadResult = await sb.storage.from('pipeline-uploads').upload(storagePath, f);
            if (uploadResult.error) throw new Error('Upload failed for ' + f.name + ': ' + uploadResult.error.message);
            filenames.push(f.name);
          }

          // Create the upload_job
          var job = await apiCall('/api/pipeline/upload', {
            subject_name: document.getElementById('subject-name').value,
            exam_board: document.getElementById('exam-board').value,
            spec_code: document.getElementById('spec-code').value,
            storage_path: jobPrefix,
            filename: filenames.join(', '),
          });

          // Parse all files
          uploadBtn.textContent = 'Parsing files...';
          var parseResult = await apiCall('/api/pipeline/parse', { job_id: job.job_id });

          // Fetch job via API (bypasses RLS for demo users)
          var status = await apiCall('/api/pipeline/status?job_id=' + job.job_id);
          currentJob = status.job;
          renderReadyForGeneration(currentJob);
        } catch (err) {
          contentEl.innerHTML += '<div class="error-msg">' + err.message + '</div>';
          uploadBtn.disabled = false;
          uploadBtn.textContent = 'Upload & Parse';
        }
      });
    }

    // ---- Ready to parse (uploaded but not yet parsed) ----
    function renderReadyToParse(job) {
      contentEl.innerHTML =
        '<div class="upload-card">' +
          '<h2>File Uploaded — Ready to Parse</h2>' +
          '<p><strong>File:</strong> ' + job.filename + '</p>' +
          '<button class="btn btn-primary" id="parse-btn">Parse PPT</button>' +
        '</div>';

      document.getElementById('parse-btn').addEventListener('click', async function () {
        this.disabled = true;
        this.textContent = 'Parsing...';
        try {
          await apiCall('/api/pipeline/parse', { job_id: job.id });
          var refetch = await sb.from('upload_jobs').select('*').eq('id', job.id).single();
          currentJob = refetch.data;
          renderReadyForGeneration(currentJob);
        } catch (err) {
          contentEl.innerHTML += '<div class="error-msg">' + err.message + '</div>';
        }
      });
    }

    // ---- Ready for generation (parsed, waiting for Claude Code) ----
    function renderReadyForGeneration(job) {
      var config = job.subject_config || {};
      var textLen = job.extracted_text_length || (job.extracted_text || '').length;
      var preview = (job.extracted_text_preview || (job.extracted_text || '').substring(0, 600)).replace(/</g, '&lt;');

      contentEl.innerHTML =
        '<div class="upload-card">' +
          '<h2>PPT Parsed — Ready for Generation</h2>' +
          '<div class="form-grid" style="margin-bottom:1rem">' +
            '<div><strong>Subject:</strong> ' + (config.subject_name || job.subject_slug) + '</div>' +
            '<div><strong>Exam Board:</strong> ' + (config.exam_board || '—') + ' ' + (config.spec_code || '') + '</div>' +
            '<div><strong>File:</strong> ' + job.filename + '</div>' +
            '<div><strong>Extracted:</strong> ' + textLen.toLocaleString() + ' characters</div>' +
          '</div>' +
          '<details style="margin-bottom:1.25rem">' +
            '<summary style="cursor:pointer;font-size:0.82rem;color:var(--text-muted)">Preview extracted text</summary>' +
            '<pre style="background:#f9fafb;padding:1rem;border-radius:8px;font-size:0.75rem;max-height:300px;overflow:auto;white-space:pre-wrap;margin-top:0.5rem">' + preview + '...</pre>' +
          '</details>' +
          '<div class="info-msg">' +
            '<strong>Next step:</strong> Open Claude Code and say:<br>' +
            '<code style="background:#e0e7ff;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.82rem">Generate lessons for pipeline job ' + job.id + '</code>' +
          '</div>' +
          '<button class="btn btn-outline" id="new-upload-btn" style="margin-top:1rem">Start New Upload</button>' +
        '</div>';

      document.getElementById('new-upload-btn').addEventListener('click', function () {
        currentJob = null;
        renderUploadForm();
      });
    }

    // ---- Generation progress (polls API for updates from Claude Code) ----
    async function renderProgress(job) {
      // Fetch pipeline steps via API (bypasses RLS)
      var status = await apiCall('/api/pipeline/status?job_id=' + job.id);
      var steps = status.steps || [];
      var total = steps.length;
      var contentDone = steps.filter(function (s) { return s.content_done; }).length;
      var pct = total > 0 ? Math.round((contentDone / total) * 100) : 0;
      var allDone = total > 0 && contentDone === total;

      var html =
        '<div class="progress-header">' +
          '<h2 style="font-family:Source Serif 4,serif;margin:0">Generation Progress</h2>' +
          '<span class="phase-badge phase-' + job.current_phase + '">' + job.current_phase + '</span>' +
        '</div>' +
        '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:' + pct + '%"></div></div>' +
        '<div class="progress-stats">' + contentDone + ' of ' + total + ' lessons generated (' + pct + '%)' +
          (allDone ? '' : ' &mdash; <span class="spinner" style="width:12px;height:12px;border-width:1.5px;vertical-align:middle"></span> auto-refreshing') +
        '</div>';

      if (allDone) {
        html += '<button class="btn btn-success" id="review-btn">Send All to QA Review</button> ';
        html += '<a href="/admin/review" class="btn btn-outline" style="margin-left:0.5rem">Open Review Queue</a>';
      }

      html += '<div class="lesson-grid" id="lesson-grid">';
      for (var i = 0; i < steps.length; i++) {
        var s = steps[i];
        var cls = s.content_done ? 'done' : (s.last_error ? 'error' : '');
        var icon = s.content_done ? '&#10003;' : (s.last_error ? '&#10007;' : '&mdash;');
        html += '<div class="lesson-card ' + cls + '">' +
          '<span class="status-icon">' + icon + '</span>' +
          '<h4>L' + s.lesson_number + ': ' + s.lesson_title + '</h4>' +
          '<div class="lesson-meta">' + s.unit_slug + '</div>' +
          (s.lesson_id && s.content_done ? '<a href="/lesson/' + job.subject_slug + '/' + s.unit_slug + '/' + s.lesson_number + '" style="font-size:0.72rem;color:#4f46e5">Preview</a>' : '') +
          (s.last_error ? '<div class="lesson-meta" style="color:#dc2626">' + s.last_error.substring(0, 60) + '</div>' : '') +
        '</div>';
      }
      html += '</div>';

      contentEl.innerHTML = html;

      // Wire review button
      var reviewBtn = document.getElementById('review-btn');
      if (reviewBtn) {
        reviewBtn.addEventListener('click', async function () {
          this.disabled = true;
          this.textContent = 'Sending to review...';
          await apiCall('/api/pipeline/approve-plan', {
            job_id: job.id,
            action: 'send_to_review',
          });
          this.textContent = 'Sent to review!';
        });
      }

      // Auto-refresh every 5s if not all done
      if (!allDone) {
        if (pollTimer) clearTimeout(pollTimer);
        pollTimer = setTimeout(function () {
          renderProgress(job);
        }, 5000);
      }
    }

    // ---- Kick off ----
    init();
  })();
  </script>
</body>
</html>
