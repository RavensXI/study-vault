  <title>Content Pipeline - StudyVault Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    // Lazy-load PDF.js only when a PDF file is encountered
    var pdfjsReady = null;
    function ensurePdfJs() {
      if (!pdfjsReady) {
        pdfjsReady = import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs').then(function(mod) {
          window.pdfjsLib = mod;
          mod.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
          return mod;
        });
      }
      return pdfjsReady;
    }
  </script>
  <style>
    .pipeline-layout { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .pipeline-header { margin-bottom: 2rem; }
    .pipeline-header h1 { font-family: 'Source Serif 4', serif; font-size: 1.75rem; margin: 0 0 0.35rem; }
    .pipeline-header p { color: var(--text-muted); font-size: 0.875rem; margin: 0; }

    /* Upload form */
    .upload-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .upload-card h2 { font-family: 'Source Serif 4', serif; font-size: 1.2rem; margin: 0 0 1.25rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group.full-width { grid-column: 1 / -1; }
    .form-group label { font-size: 0.82rem; font-weight: 600; color: var(--text-color); }
    .form-group input, .form-group select { padding: 0.55rem 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.875rem; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.15); }

    .dropzone { border: 2px dashed #ddd; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 1.25rem; }
    .dropzone:hover, .dropzone.dragover { border-color: #7c3aed; background: #f5f3ff; }
    .dropzone p { margin: 0; color: var(--text-muted); font-size: 0.875rem; }
    .dropzone .file-name { font-weight: 600; color: var(--text-color); margin-top: 0.5rem; }
    .dropzone input[type="file"] { display: none; }

    .color-row { display: flex; gap: 1rem; align-items: flex-end; }
    .color-row .form-group { flex: 1; }
    .color-row input[type="color"] { height: 40px; padding: 2px; border-radius: 8px; cursor: pointer; }

    .btn { padding: 0.6rem 1.5rem; border-radius: 10px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: all 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-success { background: #16a34a; color: white; }
    .btn-success:hover:not(:disabled) { background: #15803d; }
    .btn-outline { background: transparent; border: 1px solid #ddd; color: var(--text-color); }
    .btn-outline:hover:not(:disabled) { background: #f9fafb; }

    /* Plan review */
    .plan-card { background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 1px 8px rgba(0,0,0,0.06); margin-bottom: 1rem; }
    .plan-card h2 { font-family: 'Source Serif 4', serif; font-size: 1.2rem; margin: 0 0 1rem; }
    .unit-block { margin-bottom: 1.5rem; }
    .unit-block h3 { font-size: 0.95rem; font-weight: 700; margin: 0 0 0.5rem; padding-bottom: 0.4rem; border-bottom: 2px solid #e5e7eb; }
    .lesson-list { list-style: none; padding: 0; margin: 0; }
    .lesson-list li { padding: 0.4rem 0; font-size: 0.875rem; color: var(--text-color); display: flex; gap: 0.5rem; }
    .lesson-list .lesson-num { font-weight: 700; color: var(--text-muted); min-width: 2rem; }

    /* Progress grid */
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .progress-bar-outer { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-bar-inner { height: 100%; background: #16a34a; border-radius: 4px; transition: width 0.3s; }
    .progress-stats { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.75rem; }

    .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; }
    .lesson-card { background: white; border-radius: 12px; padding: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); border-left: 3px solid #e5e7eb; }
    .lesson-card.done { border-left-color: #16a34a; }
    .lesson-card.in-progress { border-left-color: #f59e0b; }
    .lesson-card.error { border-left-color: #dc2626; }
    .lesson-card h4 { font-size: 0.82rem; font-weight: 600; margin: 0 0 0.25rem; }
    .lesson-card .lesson-meta { font-size: 0.72rem; color: var(--text-muted); }
    .lesson-card .status-icon { float: right; font-size: 1rem; }

    /* Status indicators */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #f59e0b; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .phase-badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 10px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .phase-uploaded { background: #f3f4f6; color: #6b7280; }
    .phase-parsing { background: #fef3c7; color: #92400e; }
    .phase-parsed { background: #dbeafe; color: #1d4ed8; }
    .phase-planning { background: #fef3c7; color: #92400e; }
    .phase-planned { background: #dbeafe; color: #1d4ed8; }
    .phase-generating { background: #fef3c7; color: #92400e; }
    .phase-complete { background: #d1fae5; color: #065f46; }
    .phase-failed { background: #fee2e2; color: #dc2626; }

    .error-msg { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 0.75rem 1rem; color: #dc2626; font-size: 0.82rem; margin: 1rem 0; }
    .info-msg { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 0.75rem 1rem; color: #1d4ed8; font-size: 0.82rem; margin: 1rem 0; }

    .done-section { text-align: center; padding: 2rem; }
    .done-section h2 { font-family: 'Source Serif 4', serif; color: #16a34a; }
    .done-links { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }

    /* Asset badges */
    .asset-badges { display: flex; gap: 3px; margin-top: 0.4rem; }
    .asset-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 18px; border-radius: 3px; font-size: 0.62rem; font-weight: 700; line-height: 1; }
    .asset-badge.done { background: #d1fae5; color: #065f46; }
    .asset-badge.pending { background: #f3f4f6; color: #9ca3af; }
    .asset-badge.error { background: #fee2e2; color: #dc2626; }

    /* Multi-segment progress summary */
    .progress-segments { display: flex; flex-wrap: wrap; gap: 0.75rem 1.5rem; margin-bottom: 1rem; font-size: 0.78rem; }
    .progress-segments .seg { color: var(--text-muted); }
    .progress-segments .seg strong { color: var(--text-color); }

    /* Job list */
    .job-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .job-list-header h2 { font-family: 'Source Serif 4', serif; font-size: 1.2rem; margin: 0; }
    .job-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .job-table th { text-align: left; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); padding: 0.5rem 0.75rem; border-bottom: 2px solid #e5e7eb; }
    .job-table td { padding: 0.65rem 0.75rem; font-size: 0.82rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
    .job-table tr.clickable { cursor: pointer; transition: background 0.1s; }
    .job-table tr.clickable:hover { background: #f9fafb; }
    .job-subject { font-weight: 600; }
    .job-file { color: var(--text-muted); font-size: 0.75rem; }
    .job-date { color: var(--text-muted); font-size: 0.75rem; }
    .job-counts { font-size: 0.72rem; color: var(--text-muted); }
    .job-counts strong { color: var(--text-color); }
    .filter-tabs { display: flex; gap: 0.25rem; background: #f3f4f6; border-radius: 8px; padding: 2px; }
    .filter-tab { padding: 0.3rem 0.75rem; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 0.75rem; font-weight: 500; color: var(--text-muted); }
    .filter-tab.active { background: white; color: var(--text-color); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-state p { margin: 0.5rem 0; font-size: 0.875rem; }
    .back-link { font-size: 0.82rem; color: #4f46e5; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.25rem; margin-bottom: 1rem; }
    .back-link:hover { text-decoration: underline; }

    /* File triage */
    .triage-summary {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; background: #f9fafb; border-radius: 10px;
      margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .triage-summary .counts { font-size: 0.875rem; font-weight: 600; }
    .triage-summary .size { font-size: 0.82rem; color: var(--text-muted); }
    .triage-actions { display: flex; gap: 0.5rem; }
    .triage-actions .btn { padding: 0.35rem 0.8rem; font-size: 0.78rem; }
    .triage-sort { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; align-items: center; }
    .triage-sort label { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
    .triage-sort select { padding: 0.3rem 0.6rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.78rem; font-family: inherit; }
    .triage-folder { margin-bottom: 0.5rem; }
    .triage-folder-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.5rem; background: #f3f4f6; border-radius: 8px;
      cursor: pointer; user-select: none; font-size: 0.82rem; font-weight: 600;
    }
    .triage-folder-header input[type="checkbox"] { accent-color: #7c3aed; }
    .triage-folder-header .folder-count { font-weight: 400; color: var(--text-muted); font-size: 0.75rem; margin-left: auto; }
    .triage-file {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0.5rem 0.35rem 2rem; font-size: 0.82rem;
      border-bottom: 1px solid #f3f4f6; transition: opacity 0.15s;
    }
    .triage-file:last-child { border-bottom: none; }
    .triage-file input[type="checkbox"] { accent-color: #7c3aed; flex-shrink: 0; }
    .triage-file .file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .triage-file .file-size { color: var(--text-muted); font-size: 0.75rem; flex-shrink: 0; min-width: 3.5rem; text-align: right; }
    .triage-file .file-tag {
      display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px;
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.03em; flex-shrink: 0;
    }
    .triage-file .file-tag.exclude { background: #fee2e2; color: #dc2626; }
    .triage-file .file-tag.duplicate { background: #fef3c7; color: #92400e; }
    .triage-file .file-tag.lesson { background: #dbeafe; color: #1d4ed8; }
    .triage-file.excluded { opacity: 0.45; }
    .triage-file.excluded .file-name { text-decoration: line-through; }
    .triage-file-list { max-height: 500px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 10px; padding: 0.25rem 0; }

    /* Wizard steps */
    .wizard-progress { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .wizard-dot {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; background: #e5e7eb; color: #9ca3af; transition: all 0.2s;
    }
    .wizard-dot.active { background: #7c3aed; color: white; }
    .wizard-dot.done { background: #16a34a; color: white; }
    .wizard-dot.skipped { background: #e5e7eb; color: #d1d5db; }
    .wizard-connector { flex: 0 0 24px; height: 2px; background: #e5e7eb; }
    .wizard-connector.done { background: #16a34a; }
    .wizard-step-label { font-size: 0.78rem; color: var(--text-muted); margin-left: 0.5rem; }
    .wizard-step-title { font-family: 'Source Serif 4', serif; font-size: 1.15rem; margin: 0 0 0.35rem; }
    .wizard-step-desc { font-size: 0.875rem; color: var(--text-muted); margin: 0 0 1.25rem; }
    .wizard-step-desc strong { color: var(--text-color); }
    .wizard-group { margin-bottom: 0.75rem; }
    .wizard-group-header {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
      background: #f9fafb; border-radius: 8px; font-size: 0.82rem; font-weight: 600; color: var(--text-color);
    }
    .wizard-group-header .group-count { font-weight: 400; color: var(--text-muted); font-size: 0.75rem; margin-left: auto; }
    .wizard-group-files { display: none; border: 1px solid #f3f4f6; border-radius: 0 0 8px 8px; margin-top: -2px; padding: 0.25rem 0; }
    .wizard-group-files.expanded { display: block; }
    .wizard-actions { display: flex; gap: 0.75rem; align-items: center; margin-top: 1.25rem; flex-wrap: wrap; }
    .wizard-actions .btn-success { padding: 0.65rem 1.5rem; font-size: 0.9rem; }
    .wizard-review-link { font-size: 0.82rem; color: #4f46e5; cursor: pointer; text-decoration: none; }
    .wizard-review-link:hover { text-decoration: underline; }
    .wizard-dupe-group { background: #f9fafb; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .wizard-dupe-group .dupe-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 0.35rem; }
    .wizard-dupe-group .dupe-copy { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; font-size: 0.82rem; }
    .wizard-dupe-group .dupe-copy .folder-path { color: var(--text-muted); font-size: 0.75rem; }
    .wizard-dupe-group .dupe-copy.removed { opacity: 0.45; text-decoration: line-through; }
    .wizard-empty-step { text-align: center; padding: 2rem 1rem; color: #16a34a; font-size: 0.875rem; font-weight: 600; }

    /* Upload layout with guide sidebar */
    .upload-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }
    .upload-guide { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
    .upload-guide h3 { font-family: 'Source Serif 4', serif; font-size: 1rem; margin: 0 0 1rem; }
    .upload-guide h4 { font-size: 0.78rem; font-weight: 700; margin: 1rem 0 0.35rem; color: var(--text-color); text-transform: uppercase; letter-spacing: 0.03em; }
    .upload-guide h4:first-of-type { margin-top: 0; }
    .upload-guide ul { margin: 0; padding-left: 1.25rem; }
    .upload-guide li { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 0.3rem; }
    .upload-guide li strong { color: var(--text-color); font-weight: 600; }
    .upload-guide .guide-note { font-size: 0.72rem; color: var(--text-muted); background: #f9fafb; border-radius: 8px; padding: 0.6rem 0.75rem; margin-top: 1rem; line-height: 1.5; }
    @media (max-width: 800px) { .upload-layout { grid-template-columns: 1fr; } }
  </style>
</head>

        /lesson\s*(\d+)/i,
        /\bL(\d+)\b/,
        /^(\d{1,2})\s*[-_.\s]/,
        /topic\s*(\d+)/i,
        /week\s*(\d+)/i,
        /unit\s*(\d+)/i
      ];
      for (var i = 0; i < patterns.length; i++) {
        var m = base.match(patterns[i]);
        if (m) return parseInt(m[1], 10);
      }
      return null;
    }

    function scanAndClassify(rawFiles) {
      var scanned = [];

      for (var i = 0; i < rawFiles.length; i++) {
        var f = rawFiles[i];
        var relativePath = f._relativePath || f.webkitRelativePath || f.name;
        var name = f.name;
        var ext = name.split('.').pop().toLowerCase();
        var pathParts = relativePath.split('/');
        var folder = pathParts.length > 1 ? pathParts.slice(0, -1).join('/') : '(root)';

        var isSupported = SUPPORTED_EXTENSIONS.indexOf(ext) !== -1;
        var isLegacy = LEGACY_EXTENSIONS.indexOf(ext) !== -1;
        if (!isSupported && !isLegacy) continue;

        var autoExcluded = false;
        var excludeReason = '';

        // Check folder name patterns
        var folderLower = folder.toLowerCase();
        for (var p = 0; p < EXCLUDE_FOLDER_PATTERNS.length; p++) {
          var pat = EXCLUDE_FOLDER_PATTERNS[p];
          var matched = pat.indexOf('\\b') !== -1
            ? new RegExp(pat, 'i').test(folderLower)
            : folderLower.indexOf(pat) !== -1;
          if (matched) {
            autoExcluded = true;
            excludeReason = "In \u2018" + pat.replace(/\\b/g, '') + "\u2019 folder";
            break;
          }
        }

        // Check file prefix patterns
        if (!autoExcluded) {
          for (var px = 0; px < EXCLUDE_FILE_PREFIXES.length; px++) {
            if (name.indexOf(EXCLUDE_FILE_PREFIXES[px]) === 0) {
              autoExcluded = true;
              excludeReason = name.indexOf('~$') === 0 ? 'Office temp file' : 'System file';
              break;
            }
          }
        }

        // Check exact filenames
        if (!autoExcluded && EXCLUDE_FILE_NAMES.indexOf(name.toLowerCase()) !== -1) {
          autoExcluded = true;
          excludeReason = 'System file';
        }

        // Legacy formats
        if (!autoExcluded && isLegacy) {
          autoExcluded = true;
          excludeReason = 'Legacy format (save as .' + ext + 'x)';
        }

        // File size limit (5 GB Supabase Pro plan)
        if (!autoExcluded && f.size > 5 * 1024 * 1024 * 1024) {
          autoExcluded = true;
          excludeReason = 'Over 5 GB (' + formatFileSize(f.size) + ')';
        }

        // Assign category for wizard steps
        var category = 'keep';
        if (autoExcluded) {
          // Check if it's in an excluded folder
          var inExcludedFolder = false;
          for (var ef = 0; ef < EXCLUDE_FOLDER_PATTERNS.length; ef++) {
            var efPat = EXCLUDE_FOLDER_PATTERNS[ef];
            var efMatch = efPat.indexOf('\\b') !== -1
              ? new RegExp(efPat, 'i').test(folderLower)
              : folderLower.indexOf(efPat) !== -1;
            if (efMatch) { inExcludedFolder = true; break; }
          }
          category = inExcludedFolder ? 'old_folder' : 'junk';
        }

        scanned.push({
          file: f,
          relativePath: relativePath,
          folder: folder,
          name: name,
          ext: ext,
          size: f.size,
          included: !autoExcluded,
          autoExcluded: autoExcluded,
          excludeReason: excludeReason,
          isDuplicate: false,
          category: category,
          lessonNumber: detectLessonNumber(name)
        });
      }

      // Duplicate detection: same name + same size = exact duplicate, auto-exclude extras
      // Same name but different size = flag as duplicate but let teacher decide
      var dupeMap = {};
      for (var d = 0; d < scanned.length; d++) {
        var key = scanned[d].name.toLowerCase();
        if (!dupeMap[key]) dupeMap[key] = [];
        dupeMap[key].push(d);
      }
      for (var k in dupeMap) {
        if (dupeMap[k].length > 1) {
          var indices = dupeMap[k];
          // Group by size to find exact duplicates
          var sizeGroups = {};
          for (var di = 0; di < indices.length; di++) {
            var sz = scanned[indices[di]].size;
            if (!sizeGroups[sz]) sizeGroups[sz] = [];
            sizeGroups[sz].push(indices[di]);
          }
          for (var sz in sizeGroups) {
            var group = sizeGroups[sz];
            if (group.length > 1) {
              // Exact duplicates (same name + same size): keep first, auto-exclude rest
              for (var gi = 1; gi < group.length; gi++) {
                scanned[group[gi]].isDuplicate = true;
                if (!scanned[group[gi]].autoExcluded) {
                  scanned[group[gi]].autoExcluded = true;
                  scanned[group[gi]].included = false;
                  scanned[group[gi]].excludeReason = 'Exact duplicate';
                  scanned[group[gi]].category = 'duplicate';
                }
              }
              scanned[group[0]].isDuplicate = false; // first copy is not flagged
            } else {
              // Same name, different size: flag but don't auto-exclude
              scanned[group[0]].isDuplicate = true;
            }
          }
        }
      }

      return scanned;
    }

    // ---- API helper ----
    async function apiCall(endpoint, body) {
      var headers = { 'Content-Type': 'application/json' };
      if (accessToken) {
        headers['Authorization'] = 'Bearer ' + accessToken;
      } else if (demoUser) {
        headers['X-Demo-User'] = demoUser;
      }
      var opts = { headers: headers };
      if (body !== undefined) {
        opts.method = 'POST';
        opts.body = JSON.stringify(body);
      }
      var resp = await fetch(endpoint, opts);
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error || data.detail || 'API error');
      return data;
    }

    // ---- Resume an in-progress job ----
    async function resumeJob(job) {
      var phase = job.current_phase;
      if (phase === 'uploaded') {
        renderReadyToParse(job);
      } else if (phase === 'parsed') {
        renderReadyForGeneration(job);
      } else if (phase === 'planned' || phase === 'generating' || phase === 'complete') {
        renderProgress(job);
      }
    }

      // Folder drop support — recursively read directory entries
      async function getFilesFromDrop(dataTransfer) {
        var files = [];
        var items = dataTransfer.items;
        if (!items) { return Array.from(dataTransfer.files); }

        var promises = [];
        for (var i = 0; i < items.length; i++) {
          var entry = items[i].webkitGetAsEntry ? items[i].webkitGetAsEntry() : null;
          if (entry) {
            promises.push(readEntry(entry, files));
          } else if (items[i].getAsFile) {
            files.push(items[i].getAsFile());
          }
        }
        await Promise.all(promises);
        return files;
      }

      function readEntry(entry, files) {
        return new Promise(function (resolve) {
          if (entry.isFile) {
            entry.file(function (f) {
              f._relativePath = entry.fullPath.replace(/^\//, '');
              files.push(f);
              resolve();
            });
          } else if (entry.isDirectory) {
            var reader = entry.createReader();
            var allEntries = [];
            function readBatch() {
              reader.readEntries(function (entries) {
                if (entries.length === 0) {
                  Promise.all(allEntries.map(function (e) { return readEntry(e, files); })).then(resolve);
                } else {
                  allEntries = allEntries.concat(Array.from(entries));
                  readBatch();
                }
              });
            }
            readBatch();
          } else {
            resolve();
          }
        });
      }

    // ---- File Review Wizard ----
    function renderWizard(scannedFiles, formValues) {
      var step = 1;
      var currentSort = 'smart';
      var expandedSteps = {}; // track which steps have "review individually" expanded

      // Categorise files for each step
      var junkFiles = scannedFiles.filter(function (f) { return f.category === 'junk'; });
      var oldFolderFiles = scannedFiles.filter(function (f) { return f.category === 'old_folder'; });
      var dupeFiles = scannedFiles.filter(function (f) { return f.category === 'duplicate'; });

      // Build duplicate groups for step 3
      var dupeGroups = {};
      for (var dg = 0; dg < scannedFiles.length; dg++) {
        var sf = scannedFiles[dg];
        if (sf.category === 'duplicate' || sf.category === 'keep') {
          var key = sf.name.toLowerCase();
          if (!dupeGroups[key]) dupeGroups[key] = [];
          dupeGroups[key].push(sf);
        }
      }
      // Only keep groups that actually have duplicates
      var dupeGroupList = [];
      for (var gk in dupeGroups) {
        if (dupeGroups[gk].length > 1) {
          var hasDupe = false;
          for (var gi = 0; gi < dupeGroups[gk].length; gi++) {
            if (dupeGroups[gk][gi].category === 'duplicate') { hasDupe = true; break; }
          }
          if (hasDupe) dupeGroupList.push(dupeGroups[gk]);
        }
      }

      function shouldSkip(s) {
        if (s === 1 && junkFiles.length === 0) return true;
        if (s === 2 && oldFolderFiles.length === 0) return true;
        if (s === 3 && dupeGroupList.length === 0) return true;
        return false;
      }

      // Find first valid step
      while (step <= 3 && shouldSkip(step)) step++;
      if (step > 4) step = 4;

      function nextStep() { step++; while (step <= 3 && shouldSkip(step)) step++; renderStep(); }
      function prevStep() { step--; while (step >= 1 && shouldSkip(step)) step--; if (step < 1) { renderUploadForm(formValues); return; } renderStep(); }

      var stepLabels = ['', 'Junk Files', 'Old Folders', 'Duplicates', 'Final Review'];

      function progressBar() {
        var html = '<div class="wizard-progress">';
        for (var s = 1; s <= 4; s++) {
          if (s > 1) html += '<div class="wizard-connector' + (s <= step ? ' done' : '') + '"></div>';
          var cls = s < step ? 'done' : (s === step ? 'active' : (shouldSkip(s) && s <= 3 ? 'skipped' : ''));
          html += '<div class="wizard-dot ' + cls + '">' + s + '</div>';
        }
        html += '<span class="wizard-step-label">' + stepLabels[step] + '</span>';
        html += '</div>';
        return html;
      }

      var extIcons = { pptx: '\uD83D\uDCCA', ppt: '\uD83D\uDCCA', docx: '\uD83D\uDCC4', doc: '\uD83D\uDCC4', pdf: '\uD83D\uDCD5', txt: '\uD83D\uDCDD' };

      function fileRow(sf, showFolder) {
        var cls = 'triage-file' + (sf.included ? '' : ' excluded');
        var tags = '';
        if (sf.autoExcluded && sf.excludeReason) tags += '<span class="file-tag exclude">' + sf.excludeReason + '</span>';
        if (sf.isDuplicate && sf.category !== 'duplicate') tags += '<span class="file-tag duplicate">Duplicate name</span>';
        if (sf.lessonNumber !== null && sf.included) tags += '<span class="file-tag lesson">L' + sf.lessonNumber + '</span>';
        var nameDisplay = showFolder ? '<span style="color:var(--text-muted);font-size:0.72rem">' + sf.folder + '/</span> ' + sf.name : sf.name;
        return '<div class="' + cls + '" data-path="' + sf.relativePath.replace(/"/g, '&quot;') + '">' +
          '<input type="checkbox"' + (sf.included ? ' checked' : '') + ' data-file-check="' + sf.relativePath.replace(/"/g, '&quot;') + '">' +
          '<span style="width:1rem;text-align:center;flex-shrink:0">' + (extIcons[sf.ext] || '\uD83D\uDCCE') + '</span>' +
          '<span class="file-name" title="' + sf.relativePath.replace(/"/g, '&quot;') + '">' + nameDisplay + '</span>' +
          tags +
          '<span class="file-size">' + formatFileSize(sf.size) + '</span>' +
        '</div>';
      }

      function wireFileChecks() {
        var checks = contentEl.querySelectorAll('[data-file-check]');
        for (var i = 0; i < checks.length; i++) {
          checks[i].addEventListener('change', function () {
            var path = this.getAttribute('data-file-check');
            for (var j = 0; j < scannedFiles.length; j++) {
              if (scannedFiles[j].relativePath === path) { scannedFiles[j].included = this.checked; break; }
            }
            // Update "Keep N checked" button if on old folders step
            var keepBtn = document.getElementById('wizard-keep');
            if (keepBtn) {
              var checkedCount = oldFolderFiles.filter(function (f) { return f.included; }).length;
              if (checkedCount > 0) {
                keepBtn.textContent = 'Keep ' + checkedCount + ' checked and continue';
                keepBtn.style.display = '';
              } else {
                keepBtn.style.display = 'none';
              }
            }
          });
        }
      }

      // ---- Step 1: Junk Files ----
      function renderJunkStep() {
        // Group junk by reason
        var groups = {};
        for (var i = 0; i < junkFiles.length; i++) {
          var reason = junkFiles[i].excludeReason || 'Other';
          if (!groups[reason]) groups[reason] = [];
          groups[reason].push(junkFiles[i]);
        }
        var isExpanded = expandedSteps[1];

        var html = progressBar() +
          '<div class="upload-card">' +
            '<h2 class="wizard-step-title">Junk Files</h2>' +
            '<p class="wizard-step-desc">We found <strong>' + junkFiles.length + ' file' + (junkFiles.length !== 1 ? 's' : '') + '</strong> that can\u2019t be used or are likely junk.</p>';

        var reasons = Object.keys(groups);
        for (var r = 0; r < reasons.length; r++) {
          var grp = groups[reasons[r]];
          html += '<div class="wizard-group">' +
            '<div class="wizard-group-header"><span>' + reasons[r] + '</span><span class="group-count">' + grp.length + ' file' + (grp.length !== 1 ? 's' : '') + '</span></div>' +
            '<div class="wizard-group-files' + (isExpanded ? ' expanded' : '') + '">';
          for (var gi = 0; gi < grp.length; gi++) html += fileRow(grp[gi], true);
          html += '</div></div>';
        }

        html += '<div class="wizard-actions">' +
          '<button class="btn btn-success" id="wizard-continue">Remove these and continue</button>' +
          '<a class="wizard-review-link" id="wizard-expand">' + (isExpanded ? 'Hide details' : 'Let me review individually') + '</a>' +
          '</div>';

        // Back button
        html += '<div style="margin-top:0.75rem"><a class="back-link" id="wizard-back">&larr; Back to upload form</a></div>';
        html += '</div>';

        contentEl.innerHTML = html;
        wireFileChecks();

        document.getElementById('wizard-continue').addEventListener('click', function () {
          // Ensure all junk files are excluded
          for (var i = 0; i < junkFiles.length; i++) {
            if (!junkFiles[i].included) continue; // already excluded, respect checkbox
            // Only exclude if user hasn't manually checked them back
          }
          nextStep();
        });
        document.getElementById('wizard-expand').addEventListener('click', function () {
          expandedSteps[1] = !expandedSteps[1];
          renderStep();
        });
        document.getElementById('wizard-back').addEventListener('click', function () { renderUploadForm(formValues); });
      }

      // ---- Step 2: Old/Archive Folders ----
      function renderOldFolderStep() {
        // Group by folder
        var folders = {};
        for (var i = 0; i < oldFolderFiles.length; i++) {
          var f = oldFolderFiles[i];
          if (!folders[f.folder]) folders[f.folder] = { files: [], size: 0 };
          folders[f.folder].files.push(f);
          folders[f.folder].size += f.size;
        }
        var folderNames = Object.keys(folders).sort();
        var isExpanded = expandedSteps[2];

        var html = progressBar() +
          '<div class="upload-card">' +
            '<h2 class="wizard-step-title">Old / Archive Folders</h2>' +
            '<p class="wizard-step-desc">We found <strong>' + folderNames.length + ' folder' + (folderNames.length !== 1 ? 's' : '') + '</strong> that look like old or archived resources.</p>';

        for (var fi = 0; fi < folderNames.length; fi++) {
          var fn = folderNames[fi];
          var fd = folders[fn];
          html += '<div class="wizard-group">' +
            '<div class="wizard-group-header">' +
              '<span>\uD83D\uDCC1 ' + fn + '</span>' +
              '<span class="group-count">' + fd.files.length + ' file' + (fd.files.length !== 1 ? 's' : '') + ', ' + formatFileSize(fd.size) + '</span>' +
            '</div>' +
            '<div class="wizard-group-files' + (isExpanded ? ' expanded' : '') + '">';
          for (var ffi = 0; ffi < fd.files.length; ffi++) html += fileRow(fd.files[ffi], false);
          html += '</div></div>';
        }

        if (isExpanded) {
          var checkedCount = oldFolderFiles.filter(function (f) { return f.included; }).length;
          html += '<div class="wizard-actions">';
          if (checkedCount > 0) {
            html += '<button class="btn btn-success" id="wizard-keep">Keep ' + checkedCount + ' checked and continue</button>';
          }
          html += '<button class="btn ' + (checkedCount > 0 ? 'btn-outline' : 'btn-success') + '" id="wizard-continue">Remove all and continue</button>' +
            '<a class="wizard-review-link" id="wizard-expand">Hide details</a>' +
            '</div>';
        } else {
          html += '<div class="wizard-actions">' +
            '<button class="btn btn-success" id="wizard-continue">Remove these and continue</button>' +
            '<a class="wizard-review-link" id="wizard-expand">Let me review individually</a>' +
            '</div>';
        }
        html += '<div style="margin-top:0.75rem"><a class="back-link" id="wizard-back">&larr; Back</a></div>';
        html += '</div>';

        contentEl.innerHTML = html;
        wireFileChecks();

        document.getElementById('wizard-continue').addEventListener('click', function () {
          // When removing all, uncheck everything
          for (var ra = 0; ra < oldFolderFiles.length; ra++) oldFolderFiles[ra].included = false;
          nextStep();
        });
        var keepBtn = document.getElementById('wizard-keep');
        if (keepBtn) {
          keepBtn.addEventListener('click', function () {
            // Checked files stay included, unchecked get excluded
            nextStep();
          });
        }
        document.getElementById('wizard-expand').addEventListener('click', function () {
          expandedSteps[2] = !expandedSteps[2];
          renderStep();
        });
        document.getElementById('wizard-back').addEventListener('click', function () { prevStep(); });
      }

      // ---- Step 3: Exact Duplicates ----
      function renderDuplicateStep() {
        var removedCount = 0;
        for (var c = 0; c < dupeGroupList.length; c++) {
          for (var ci = 0; ci < dupeGroupList[c].length; ci++) {
            if (dupeGroupList[c][ci].category === 'duplicate' && !dupeGroupList[c][ci].included) removedCount++;
          }
        }

        var isExpanded = expandedSteps[3];
        var html = progressBar() +
          '<div class="upload-card">' +
            '<h2 class="wizard-step-title">Exact Duplicates</h2>' +
            '<p class="wizard-step-desc">We found <strong>' + removedCount + ' duplicate file' + (removedCount !== 1 ? 's' : '') + '</strong> (same name and size in different folders). We\u2019ll keep one copy of each.</p>';

        for (var dgi = 0; dgi < dupeGroupList.length; dgi++) {
          var group = dupeGroupList[dgi];
          var keptFile = null;
          var removedFiles = [];
          for (var gf = 0; gf < group.length; gf++) {
            if (group[gf].category !== 'duplicate') { keptFile = group[gf]; }
            else { removedFiles.push(group[gf]); }
          }
          if (!keptFile && group.length > 0) keptFile = group[0]; // fallback

          html += '<div class="wizard-dupe-group">' +
            '<div class="dupe-title">' + (extIcons[keptFile.ext] || '\uD83D\uDCCE') + ' ' + keptFile.name + ' <span style="color:var(--text-muted);font-size:0.75rem">(' + formatFileSize(keptFile.size) + ')</span></div>';

          // Show kept copy
          html += '<div class="dupe-copy"><span style="color:#16a34a;font-weight:600;font-size:0.75rem">KEEP</span> ' + keptFile.folder + '</div>';
          // Show removed copies
          for (var ri = 0; ri < removedFiles.length; ri++) {
            html += '<div class="dupe-copy removed"><span style="color:#dc2626;font-weight:600;font-size:0.75rem">REMOVE</span> ' + removedFiles[ri].folder + '</div>';
          }

          if (isExpanded) {
            // Show radio buttons to choose which copy to keep
            html += '<div style="margin-top:0.35rem;padding-top:0.35rem;border-top:1px solid #e5e7eb;font-size:0.78rem;color:var(--text-muted)">Choose which to keep:</div>';
            for (var rr = 0; rr < group.length; rr++) {
              var isKept = group[rr].included;
              html += '<div class="dupe-copy"><label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">' +
                '<input type="radio" name="dupe-' + dgi + '" value="' + group[rr].relativePath.replace(/"/g, '&quot;') + '"' + (isKept ? ' checked' : '') + ' data-dupe-group="' + dgi + '">' +
                group[rr].folder + '</label></div>';
            }
          }
          html += '</div>';
        }

        html += '<div class="wizard-actions">' +
          '<button class="btn btn-success" id="wizard-continue">Keep one of each and continue</button>' +
          '<a class="wizard-review-link" id="wizard-expand">' + (isExpanded ? 'Hide choices' : 'Let me choose which copies to keep') + '</a>' +
          '</div>';
        html += '<div style="margin-top:0.75rem"><a class="back-link" id="wizard-back">&larr; Back</a></div>';
        html += '</div>';

        contentEl.innerHTML = html;

        // Wire radio buttons for custom dupe selection
        var radios = contentEl.querySelectorAll('[data-dupe-group]');
        for (var rd = 0; rd < radios.length; rd++) {
          radios[rd].addEventListener('change', function () {
            var groupIdx = parseInt(this.getAttribute('data-dupe-group'), 10);
            var keepPath = this.value;
            var grp = dupeGroupList[groupIdx];
            for (var g = 0; g < grp.length; g++) {
              grp[g].included = (grp[g].relativePath === keepPath);
            }
            renderStep(); // re-render to update visual state
          });
        }

        document.getElementById('wizard-continue').addEventListener('click', function () { nextStep(); });
        document.getElementById('wizard-expand').addEventListener('click', function () {
          expandedSteps[3] = !expandedSteps[3];
          renderStep();
        });
        document.getElementById('wizard-back').addEventListener('click', function () { prevStep(); });
      }

      // ---- Step 4: Final Review ----
      function renderFinalStep() {
        var prevList = contentEl.querySelector('.triage-file-list');
        var scrollTop = prevList ? prevList.scrollTop : 0;

        // Only show files that survived steps 1-3 (included=true) plus clean files
        var allFiles = scannedFiles;
        var includedCount = 0, includedSize = 0;
        for (var i = 0; i < allFiles.length; i++) {
          if (allFiles[i].included) { includedCount++; includedSize += allFiles[i].size; }
        }

        // Sort
        function sortFiles(files, mode) {
          var sorted = files.slice();
          if (mode === 'smart') {
            sorted.sort(function (a, b) {
              if (a.included !== b.included) return a.included ? -1 : 1;
              if (a.lessonNumber !== null && b.lessonNumber !== null) return a.lessonNumber - b.lessonNumber;
              if (a.lessonNumber !== null) return -1;
              if (b.lessonNumber !== null) return 1;
              return a.name.localeCompare(b.name);
            });
          } else if (mode === 'folder') {
            sorted.sort(function (a, b) {
              if (a.folder !== b.folder) return a.folder.localeCompare(b.folder);
              return a.name.localeCompare(b.name);
            });
          } else if (mode === 'name') {
            sorted.sort(function (a, b) { return a.name.localeCompare(b.name); });
          } else if (mode === 'size') {
            sorted.sort(function (a, b) { return b.size - a.size; });
          } else if (mode === 'type') {
            sorted.sort(function (a, b) {
              if (a.ext !== b.ext) return a.ext.localeCompare(b.ext);
              return a.name.localeCompare(b.name);
            });
          }
          return sorted;
        }

        // Only show files not already removed in earlier steps (or show all and let checkboxes reflect state)
        var displayFiles = sortFiles(allFiles.filter(function (f) {
          // Hide junk/old_folder/duplicate that are excluded — they were dealt with
          if (!f.included && (f.category === 'junk' || f.category === 'old_folder' || f.category === 'duplicate')) return false;
          return true;
        }), currentSort);

        var removedCount = allFiles.length - displayFiles.length;

        var html = progressBar() +
          '<div class="upload-card">' +
            '<h2 class="wizard-step-title">Final Review</h2>' +
            '<p class="wizard-step-desc"><strong>' + includedCount + ' file' + (includedCount !== 1 ? 's' : '') + '</strong> ready to upload (' + formatFileSize(includedSize) + ')' +
              (removedCount > 0 ? ' &middot; ' + removedCount + ' removed in earlier steps' : '') + '</p>' +
            '<div class="triage-summary">' +
              '<div><span class="counts">' + includedCount + ' files selected</span>' +
              '<span class="size"> of ' + displayFiles.length + ' shown &middot; ' + formatFileSize(includedSize) + '</span></div>' +
              '<div class="triage-actions">' +
                '<button class="btn btn-outline" id="triage-sel-all">Select All</button>' +
                '<button class="btn btn-outline" id="triage-desel-all">Deselect All</button>' +
              '</div>' +
            '</div>' +
            '<div class="triage-sort">' +
              '<label>Sort:</label>' +
              '<select id="triage-sort">' +
                '<option value="smart"' + (currentSort === 'smart' ? ' selected' : '') + '>Smart (lessons first)</option>' +
                '<option value="folder"' + (currentSort === 'folder' ? ' selected' : '') + '>By folder</option>' +
                '<option value="name"' + (currentSort === 'name' ? ' selected' : '') + '>By name</option>' +
                '<option value="size"' + (currentSort === 'size' ? ' selected' : '') + '>By size</option>' +
                '<option value="type"' + (currentSort === 'type' ? ' selected' : '') + '>By type</option>' +
              '</select>' +
            '</div>' +
            '<div class="triage-file-list">';

        if (currentSort === 'folder') {
          var folders = {};
          for (var g = 0; g < displayFiles.length; g++) {
            var fld = displayFiles[g].folder;
            if (!folders[fld]) folders[fld] = [];
            folders[fld].push(displayFiles[g]);
          }
          var folderNames = Object.keys(folders).sort();
          for (var fi = 0; fi < folderNames.length; fi++) {
            var fn = folderNames[fi];
            var ff = folders[fn];
            var folderInc = ff.filter(function (f) { return f.included; }).length;
            var allInc = folderInc === ff.length;
            var noneInc = folderInc === 0;
            html += '<div class="triage-folder">' +
              '<div class="triage-folder-header">' +
                '<input type="checkbox"' + (allInc ? ' checked' : '') +
                  (!allInc && !noneInc ? ' data-indeterminate="1"' : '') +
                  ' data-folder-check="' + fn.replace(/"/g, '&quot;') + '">' +
                '<span>\uD83D\uDCC1 ' + fn + '</span>' +
                '<span class="folder-count">' + folderInc + '/' + ff.length + '</span>' +
              '</div>';
            for (var ffi = 0; ffi < ff.length; ffi++) html += fileRow(ff[ffi], false);
            html += '</div>';
          }
        } else {
          for (var fl = 0; fl < displayFiles.length; fl++) html += fileRow(displayFiles[fl], false);
        }

        html += '</div>'; // file-list

        if (includedCount === 0) {
          html += '<div class="info-msg" style="margin-top:0.75rem">No files selected. Check some files above or go back and drop a different folder.</div>';
        }
        html += '<div class="wizard-actions">' +
          '<button class="btn btn-primary" id="triage-upload-btn"' + (includedCount === 0 ? ' disabled' : '') + '>' +
            'Parse ' + includedCount + ' File' + (includedCount !== 1 ? 's' : '') + '</button>' +
          '<a class="back-link" id="wizard-back" style="margin:0">&larr; Back</a>' +
        '</div></div>';

        contentEl.innerHTML = html;

        // Restore scroll position
        var newList = contentEl.querySelector('.triage-file-list');
        if (newList) newList.scrollTop = scrollTop;

        // Set indeterminate checkboxes
        var indets = contentEl.querySelectorAll('[data-indeterminate]');
        for (var ii = 0; ii < indets.length; ii++) indets[ii].indeterminate = true;

        // Wire events
        document.getElementById('triage-sort').addEventListener('change', function () { currentSort = this.value; renderStep(); });
        document.getElementById('triage-sel-all').addEventListener('click', function () {
          for (var i = 0; i < displayFiles.length; i++) displayFiles[i].included = true;
          renderStep();
        });
        document.getElementById('triage-desel-all').addEventListener('click', function () {
          for (var i = 0; i < displayFiles.length; i++) displayFiles[i].included = false;
          renderStep();
        });

        wireFileChecks();

        // Wire file checkbox changes to re-render (for count updates)
        var checks = contentEl.querySelectorAll('[data-file-check]');
        for (var ch = 0; ch < checks.length; ch++) {
          checks[ch].addEventListener('change', function () {
            var path = this.getAttribute('data-file-check');
            for (var j = 0; j < scannedFiles.length; j++) {
              if (scannedFiles[j].relativePath === path) { scannedFiles[j].included = this.checked; break; }
            }
            renderStep();
          });
        }

        var folderChecks = contentEl.querySelectorAll('[data-folder-check]');
        for (var fci = 0; fci < folderChecks.length; fci++) {
          folderChecks[fci].addEventListener('change', function () {
            var folder = this.getAttribute('data-folder-check');
            var checked = this.checked;
            for (var j = 0; j < scannedFiles.length; j++) {
              if (scannedFiles[j].folder === folder) scannedFiles[j].included = checked;
            }
            renderStep();
          });
        }

        var uploadBtn = document.getElementById('triage-upload-btn');
        if (uploadBtn) uploadBtn.addEventListener('click', function () { doTriageUpload(scannedFiles, formValues); });
        document.getElementById('wizard-back').addEventListener('click', function () { prevStep(); });
      }

      function renderStep() {
        if (step === 1) renderJunkStep();
        else if (step === 2) renderOldFolderStep();
        else if (step === 3) renderDuplicateStep();
        else renderFinalStep();
      }

      renderStep();
    }

    // ---- Browser-side file parsers ----
    async function parsePptxBrowser(buffer, filename) {
      var zip = await JSZip.loadAsync(buffer);
      var slides = [];

      for (var name in zip.files) {
        var slideMatch = name.match(/^ppt\/slides\/slide(\d+)\.xml$/);
        if (!slideMatch) continue;

        var slideNumber = parseInt(slideMatch[1]);
        var xml = await zip.files[name].async('string');
        var doc = new DOMParser().parseFromString(xml, 'text/xml');
        var textEls = doc.getElementsByTagName('a:t');
        var texts = [];
        for (var t = 0; t < textEls.length; t++) {
          var txt = textEls[t].textContent.trim();
          if (txt) texts.push(txt);
        }

        var notes = '';
        var notesPath = 'ppt/notesSlides/notesSlide' + slideNumber + '.xml';
        if (zip.files[notesPath]) {
          var notesXml = await zip.files[notesPath].async('string');
          var notesDoc = new DOMParser().parseFromString(notesXml, 'text/xml');
          var notesEls = notesDoc.getElementsByTagName('a:t');
          var noteTexts = [];
          for (var n = 0; n < notesEls.length; n++) {
            var nt = notesEls[n].textContent.trim();
            if (nt) noteTexts.push(nt);
          }
          notes = noteTexts.join(' ');
        }

        slides.push({ slideNumber: slideNumber, text: texts.join(' '), notes: notes });
      }

      slides.sort(function (a, b) { return a.slideNumber - b.slideNumber; });

      var lines = slides.map(function (s) {
        var content = '--- Slide ' + s.slideNumber + ' ---\n' + s.text;
        if (s.notes) content += '\n[Speaker Notes: ' + s.notes + ']';
        return content;
      });

      return '=== FILE: ' + filename + ' (' + slides.length + ' slides) ===\n\n' + lines.join('\n\n');
    }

    async function parseDocxBrowser(buffer, filename) {
      var zip = await JSZip.loadAsync(buffer);
      var docFile = zip.files['word/document.xml'];
      if (!docFile) return '=== FILE: ' + filename + ' ===\n\n(No document.xml found)';

      var xml = await docFile.async('string');
      var doc = new DOMParser().parseFromString(xml, 'text/xml');
      var textEls = doc.getElementsByTagName('w:t');
      var texts = [];
      for (var t = 0; t < textEls.length; t++) {
        var txt = textEls[t].textContent.trim();
        if (txt) texts.push(txt);
      }

      return '=== FILE: ' + filename + ' ===\n\n' + texts.join(' ');
    }

    async function parsePdfBrowser(buffer, filename) {
      var pdfjs = await ensurePdfJs();
      var pdf = await pdfjs.getDocument({ data: buffer }).promise;
      var pages = [];

      for (var p = 1; p <= pdf.numPages; p++) {
        var page = await pdf.getPage(p);
        var content = await page.getTextContent();
        var text = content.items.map(function (item) { return item.str; }).join(' ');
        pages.push(text);
      }

      return '=== FILE: ' + filename + ' (' + pdf.numPages + ' pages) ===\n\n' + pages.join('\n\n');
    }

    async function parseFileBrowser(file) {
      var ext = file.name.split('.').pop().toLowerCase();
      var buffer = await file.arrayBuffer();

      if (ext === 'pptx') return await parsePptxBrowser(buffer, file.name);
      if (ext === 'docx') return await parseDocxBrowser(buffer, file.name);
      if (ext === 'pdf') return await parsePdfBrowser(buffer, file.name);
      if (ext === 'txt') {
        var text = new TextDecoder('utf-8').decode(buffer);
        return '=== FILE: ' + file.name + ' ===\n\n' + text;
      }
      return null; // unsupported format
    }

    async function doTriageUpload(scannedFiles, formValues) {
      var included = scannedFiles.filter(function (f) { return f.included; });
      if (included.length === 0) return;

      var totalSize = 0;
      for (var ts = 0; ts < included.length; ts++) totalSize += included[ts].size;

      // Take over the entire content area with a dedicated progress view
      function renderParseProgress(current, total, currentName) {
        var pct = total > 0 ? Math.round((current / total) * 100) : 0;
        var parsedSize = 0;
        for (var us = 0; us < current; us++) parsedSize += included[us].size;

        contentEl.innerHTML =
          '<div class="upload-card" style="text-align:center;padding:3rem 2rem">' +
            '<h2 style="font-family:Source Serif 4,serif;margin:0 0 0.5rem">Parsing Files...</h2>' +
            '<p style="color:var(--text-muted);font-size:0.875rem;margin:0 0 1.5rem">' +
              'Extracting text from your files in the browser. No files leave your device.' +
            '</p>' +
            '<div class="progress-bar-outer" style="margin-bottom:0.75rem">' +
              '<div class="progress-bar-inner" style="width:' + pct + '%;background:#7c3aed"></div>' +
            '</div>' +
            '<p style="font-size:0.875rem;font-weight:600;margin:0 0 0.25rem">' + current + ' / ' + total + ' files (' + pct + '%)</p>' +
            '<p style="font-size:0.78rem;color:var(--text-muted);margin:0 0 0.25rem">' + formatFileSize(parsedSize) + ' / ' + formatFileSize(totalSize) + '</p>' +
            '<p style="font-size:0.78rem;color:var(--text-muted);margin:0">' + (currentName || '') + '</p>' +
          '</div>';
      }

      renderParseProgress(0, included.length, included[0].name);

      try {
        var allText = [];
        var filenames = [];
        var failedFiles = [];

        for (var i = 0; i < included.length; i++) {
          renderParseProgress(i, included.length, included[i].name);
          var sf = included[i];
          try {
            var parsed = await parseFileBrowser(sf.file);
            if (parsed) {
              allText.push(parsed);
              filenames.push(sf.name);
            } else {
              failedFiles.push({ name: sf.name, error: 'Unsupported format' });
            }
          } catch (fileErr) {
            failedFiles.push({ name: sf.name, error: fileErr.message || 'Parse failed' });
          }
        }

        if (filenames.length === 0) {
          throw new Error('All ' + included.length + ' files failed to parse.');
        }

        renderParseProgress(included.length, included.length, 'Saving...');

        var extractedText = allText.join('\n\n\n');

        var job = await apiCall('/api/pipeline/upload', {
          subject_name: formValues.subject_name,
          exam_board: formValues.exam_board,
          spec_code: formValues.spec_code,
          school_id: formValues.school_id || null,
          filename: filenames.join(', '),
          extracted_text: extractedText
        });

        var status = await apiCall('/api/pipeline/status?job_id=' + job.job_id);
        currentJob = status.job;

        // Show failures summary before moving on, if any
        if (failedFiles.length > 0) {
          var failHtml =
            '<div class="upload-card">' +
              '<h2 style="font-family:Source Serif 4,serif;color:#16a34a;margin:0 0 0.5rem">Parsing Complete</h2>' +
              '<p style="font-size:0.875rem;margin:0 0 1rem"><strong>' + filenames.length + '</strong> files parsed successfully.</p>' +
              '<div class="error-msg" style="text-align:left">' +
                '<strong>' + failedFiles.length + ' file' + (failedFiles.length !== 1 ? 's' : '') + ' failed to parse:</strong><br>';
          for (var fi = 0; fi < failedFiles.length; fi++) {
            failHtml += '<span style="font-size:0.78rem">' + failedFiles[fi].name + ' \u2014 ' + failedFiles[fi].error + '</span><br>';
          }
          failHtml += '<p style="font-size:0.78rem;margin:0.5rem 0 0">These files were skipped. The rest have been parsed and are ready for generation.</p>' +
              '</div>' +
              '<button class="btn btn-primary" id="continue-after-fail" style="margin-top:1rem">Continue to Generation</button>' +
            '</div>';
          contentEl.innerHTML = failHtml;
          document.getElementById('continue-after-fail').addEventListener('click', function () {
            renderReadyForGeneration(currentJob);
          });
        } else {
          renderReadyForGeneration(currentJob);
        }
      } catch (err) {
        contentEl.innerHTML =
          '<div class="upload-card">' +
            '<div class="error-msg">' + err.message + '</div>' +
            '<button class="btn btn-outline" id="upload-error-back" style="margin-top:1rem">Back to file review</button>' +
          '</div>';
        document.getElementById('upload-error-back').addEventListener('click', function () {
          renderWizard(scannedFiles, formValues);
        });
      }
    }

    // ---- Ready to parse (uploaded but not yet parsed) ----
    function renderReadyToParse(job) {
      contentEl.innerHTML =
        '<a class="back-link" id="back-to-jobs">&larr; All Jobs</a>' +
        '<div class="upload-card">' +
          '<h2>File Uploaded — Ready to Parse</h2>' +
          '<p><strong>File:</strong> ' + job.filename + '</p>' +
          '<button class="btn btn-primary" id="parse-btn">Parse PPT</button>' +
        '</div>';

      document.getElementById('back-to-jobs').addEventListener('click', function () { renderJobList(); });
      document.getElementById('parse-btn').addEventListener('click', async function () {
        this.disabled = true;
        this.textContent = 'Parsing...';
        try {
          await apiCall('/api/pipeline/parse', { job_id: job.id });
          var refetch = await sb.from('upload_jobs').select('*').eq('id', job.id).single();
          currentJob = refetch.data;
          renderReadyForGeneration(currentJob);
        } catch (err) {
          contentEl.innerHTML += '<div class="error-msg">' + err.message + '</div>';
        }
      });
    }

    // ---- Ready for generation (parsed, waiting for Claude Code) ----
    function renderReadyForGeneration(job) {
      var config = job.subject_config || {};
      var textLen = job.extracted_text_length || (job.extracted_text || '').length;
      var preview = (job.extracted_text_preview || (job.extracted_text || '').substring(0, 600)).replace(/</g, '&lt;');

      contentEl.innerHTML =
        '<a class="back-link" id="back-to-jobs">&larr; All Jobs</a>' +
        '<div class="upload-card">' +
          '<h2>PPT Parsed — Ready for Generation</h2>' +
          '<div class="form-grid" style="margin-bottom:1rem">' +
            '<div><strong>Subject:</strong> ' + (config.subject_name || job.subject_slug) + '</div>' +
            '<div><strong>Exam Board:</strong> ' + (config.exam_board || '—') + ' ' + (config.spec_code || '') + '</div>' +
            '<div><strong>File:</strong> ' + job.filename + '</div>' +
            '<div><strong>Extracted:</strong> ' + textLen.toLocaleString() + ' characters</div>' +
          '</div>' +
          '<details style="margin-bottom:1.25rem">' +
            '<summary style="cursor:pointer;font-size:0.82rem;color:var(--text-muted)">Preview extracted text</summary>' +
            '<pre style="background:#f9fafb;padding:1rem;border-radius:8px;font-size:0.75rem;max-height:300px;overflow:auto;white-space:pre-wrap;margin-top:0.5rem">' + preview + '...</pre>' +
          '</details>' +
          '<div class="info-msg">' +
            '<strong>Next step:</strong> Open Claude Code and say:<br>' +
            '<code style="background:#e0e7ff;padding:0.2rem 0.5rem;border-radius:4px;font-size:0.82rem">Generate lessons for pipeline job ' + job.id + '</code>' +
          '</div>' +
          '<button class="btn btn-outline" id="new-upload-btn" style="margin-top:1rem">Start New Upload</button>' +
        '</div>';

      document.getElementById('back-to-jobs').addEventListener('click', function () { renderJobList(); });
      document.getElementById('new-upload-btn').addEventListener('click', function () {
        currentJob = null;
        renderUploadForm();
      });
    }

    // ---- Generation progress (polls API for updates from Claude Code) ----
    async function renderProgress(job) {
      // Fetch pipeline steps via API (bypasses RLS)
      var status = await apiCall('/api/pipeline/status?job_id=' + job.id);
      var steps = status.steps || [];
      var sm = status.summary || {};
      var total = sm.total || steps.length;
      var contentDone = sm.content_complete || 0;
      var pct = total > 0 ? Math.round((contentDone / total) * 100) : 0;
      var allContentDone = sm.all_content_done;

      // Check if ALL assets are done (not just content)
      var allAssetsDone = allContentDone &&
        (sm.diagrams_complete || 0) >= total &&
        (sm.hero_complete || 0) >= total &&
        (sm.narration_complete || 0) >= total;

      var html =
        '<a class="back-link" id="back-to-jobs">&larr; All Jobs</a>' +
        '<div class="progress-header">' +
          '<h2 style="font-family:Source Serif 4,serif;margin:0">Generation Progress</h2>' +
          '<span class="phase-badge phase-' + job.current_phase + '">' + job.current_phase + '</span>' +
        '</div>' +
        '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:' + pct + '%"></div></div>' +
        '<div class="progress-segments">' +
          '<span class="seg"><strong>' + contentDone + '/' + total + '</strong> content</span>' +
          '<span class="seg"><strong>' + (sm.diagrams_complete || 0) + '/' + total + '</strong> diagrams</span>' +
          '<span class="seg"><strong>' + (sm.hero_complete || 0) + '/' + total + '</strong> heroes</span>' +
          '<span class="seg"><strong>' + (sm.narration_complete || 0) + '/' + total + '</strong> narration</span>' +
          '<span class="seg"><strong>' + (sm.media_complete || 0) + '/' + total + '</strong> media</span>' +
          (sm.error_count ? '<span class="seg" style="color:#dc2626"><strong>' + sm.error_count + '</strong> errors</span>' : '') +
          (allContentDone ? '' : ' <span class="spinner" style="width:12px;height:12px;border-width:1.5px;vertical-align:middle"></span>') +
        '</div>';

      if (allContentDone) {
        html += '<button class="btn btn-success" id="review-btn">Send All to QA Review</button> ';
        html += '<a href="/admin/review" class="btn btn-outline" style="margin-left:0.5rem">Open Review Queue</a>';
      }

      html += '<div class="lesson-grid" id="lesson-grid">';
      for (var i = 0; i < steps.length; i++) {
        var s = steps[i];
        var cls = s.content_done ? 'done' : (s.last_error ? 'error' : '');
        var icon = s.content_done ? '&#10003;' : (s.last_error ? '&#10007;' : '&mdash;');

        // Asset badge helper
        function badge(flag, letter) {
          return '<span class="asset-badge ' + (flag ? 'done' : 'pending') + '">' + letter + '</span>';
        }

        html += '<div class="lesson-card ' + cls + '">' +
          '<span class="status-icon">' + icon + '</span>' +
          '<h4>L' + s.lesson_number + ': ' + s.lesson_title + '</h4>' +
          '<div class="lesson-meta">' + s.unit_slug + '</div>' +
          '<div class="asset-badges">' +
            badge(s.content_done, 'C') +
            badge(s.diagrams_done, 'D') +
            badge(s.hero_done, 'H') +
            badge(s.narration_done, 'N') +
            badge(s.media_done, 'M') +
          '</div>' +
          (s.lesson_id && s.content_done ? '<a href="/lesson/' + job.subject_slug + '/' + s.unit_slug + '/' + s.lesson_number + '" style="font-size:0.72rem;color:#4f46e5">Preview</a>' : '') +
          (s.last_error ? '<div class="lesson-meta" style="color:#dc2626">' + s.last_error.substring(0, 60) + '</div>' : '') +
        '</div>';
      }
      html += '</div>';

      contentEl.innerHTML = html;

      // Wire back link
      document.getElementById('back-to-jobs').addEventListener('click', function () { renderJobList(); });

      // Wire review button
      var reviewBtn = document.getElementById('review-btn');
      if (reviewBtn) {
        reviewBtn.addEventListener('click', async function () {
          this.disabled = true;
          this.textContent = 'Sending to review...';
          await apiCall('/api/pipeline/approve-plan', {
            job_id: job.id,
            action: 'send_to_review',
          });
          this.textContent = 'Sent to review!';
          // Refresh after a moment to update the view
          setTimeout(function () { renderJobList(); }, 1500);
        });
      }

      // Auto-refresh every 5s if not all content done, or 15s if assets still running
      var needsRefresh = !allContentDone || (!allAssetsDone && allContentDone);
      if (needsRefresh) {
        var interval = allContentDone ? 15000 : 5000;
        if (pollTimer) clearTimeout(pollTimer);
        pollTimer = setTimeout(function () {
          renderProgress(job);
        }, interval);
      }
    }

    // ---- Kick off ----
    init();
  })();
  </script>
</body>
</html>
