<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image QA - StudyVault Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/auth-gate.js" data-role="admin,teacher"></script>
  <script src="/js/teacher-setup.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .qa-layout { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .qa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .qa-header h1 { font-family: 'Source Serif 4', serif; font-size: 1.75rem; margin: 0; }
    .qa-controls { display: flex; gap: 0.75rem; align-items: center; }
    .qa-controls select { padding: 0.45rem 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.82rem; font-family: inherit; }

    /* Tabs */
    .qa-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; }
    .qa-tab { padding: 0.6rem 1.25rem; font-size: 0.875rem; font-weight: 600; border: none; background: none; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
    .qa-tab.active { color: #7c3aed; border-bottom-color: #7c3aed; }
    .qa-tab:hover:not(.active) { color: var(--text-color); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .lesson-row { background: white; border-radius: 16px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); margin-bottom: 1.25rem; overflow: hidden; }
    .lesson-row-header { padding: 0.75rem 1.25rem; background: #f9fafb; border-bottom: 1px solid #f0ede8; display: flex; justify-content: space-between; align-items: center; }
    .lesson-row-header h3 { margin: 0; font-size: 0.95rem; font-family: 'Source Serif 4', serif; }
    .lesson-row-header .lesson-num { color: var(--text-muted); font-size: 0.78rem; }
    .lesson-row-body { padding: 1.25rem; }

    /* Hero preview — uses the EXACT same CSS as the lesson page hero */
    /* Wrapped in a container that simulates the lesson content column width */
    .hero-preview-wrap { width: 100%; max-width: calc(var(--page-max, 1160px) - var(--sidebar-width, 260px) - 3rem - 3rem); }
    .hero-preview { position: relative; margin: 0 0 1rem; border-radius: var(--radius, 16px); overflow: hidden; background: #f0ede8; cursor: grab; }
    .hero-preview:active { cursor: grabbing; }
    .hero-preview img { display: block; width: 100%; height: 280px; object-fit: cover; pointer-events: none; user-select: none; }
    .hero-preview .no-image { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 0.82rem; }
    .hero-preview .position-label { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.65); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; pointer-events: none; }

    /* Position slider */
    .position-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .position-row label { font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
    .position-row input[type="range"] { flex: 1; accent-color: #7c3aed; }
    .position-row .pos-value { font-size: 0.75rem; color: var(--text-muted); min-width: 3rem; text-align: right; }

    /* Candidates grid */
    .candidates { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .candidate { width: 140px; height: 90px; border-radius: 8px; overflow: hidden; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s; position: relative; flex-shrink: 0; }
    .candidate:hover { border-color: #7c3aed; }
    .candidate.selected { border-color: #7c3aed; }
    .candidate img { width: 100%; height: 100%; object-fit: cover; }
    .candidate .badge { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.6); color: white; font-size: 0.6rem; padding: 1px 5px; border-radius: 3px; }

    /* Action buttons */
    .action-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .btn { padding: 0.45rem 1rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: all 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .btn-success { background: #16a34a; color: white; }
    .btn-success:hover:not(:disabled) { background: #15803d; }
    .btn-outline { background: transparent; border: 1px solid #ddd; color: var(--text-color); }
    .btn-outline:hover:not(:disabled) { background: #f9fafb; }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-danger:hover:not(:disabled) { background: #fee2e2; }

    .save-toast { display: inline-block; font-size: 0.78rem; color: #16a34a; font-weight: 600; margin-left: 0.5rem; opacity: 0; transition: opacity 0.3s; }
    .save-toast.show { opacity: 1; }

    .search-input { padding: 0.4rem 0.65rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.78rem; font-family: inherit; width: 200px; }

    .loading-msg { text-align: center; padding: 3rem; color: var(--text-muted); }

    /* Diagram tab styles */
    .diagram-preview { position: relative; max-width: 720px; border-radius: 10px; overflow: hidden; background: #f0ede8; margin-bottom: 1rem; }
    .diagram-preview img { display: block; width: 100%; height: auto; max-height: 500px; object-fit: contain; }
    .diagram-preview .no-image { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text-muted); font-size: 0.82rem; }

    .diagram-context { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1rem; padding: 0.75rem 1rem; background: #f9fafb; border-radius: 8px; border-left: 3px solid #7c3aed; }
    .diagram-context strong { color: var(--text-color); }

    .diagram-prompt-area { margin-bottom: 1rem; }
    .diagram-prompt-area label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 0.35rem; }
    .diagram-prompt-area textarea { width: 100%; max-width: 720px; min-height: 100px; padding: 0.6rem 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.78rem; font-family: inherit; line-height: 1.5; resize: vertical; box-sizing: border-box; }
    .diagram-prompt-area textarea:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.15); }

    .diagram-status { font-size: 0.78rem; margin-top: 0.5rem; }
    .diagram-status.error { color: #dc2626; }
    .diagram-status.success { color: #16a34a; }
    .diagram-status.working { color: #7c3aed; }

    .diagram-result { margin-top: 1rem; max-width: 720px; border-radius: 10px; overflow: hidden; background: #f0ede8; }
    .diagram-result img { display: block; width: 100%; height: auto; }

    .diagram-count { font-size: 0.72rem; color: var(--text-muted); margin-left: 0.5rem; }
  </style>
</head>

  <div class="qa-layout" id="qa-app">
    <div class="qa-header">
      <h1>Image QA</h1>
      <div class="qa-controls">
        <select id="subject-select"><option value="">Loading...</option></select>
        <select id="unit-select"><option value="">All units</option></select>
      </div>
    </div>

    <div class="qa-tabs">
      <button class="qa-tab active" data-tab="hero">Hero Images</button>
      <button class="qa-tab" data-tab="diagrams">Diagrams</button>
    </div>

    <div id="panel-hero" class="tab-panel active">
      <div id="qa-content"><div class="loading-msg">Select a subject to begin.</div></div>
    </div>

    <div id="panel-diagrams" class="tab-panel">
      <div id="diagrams-content"><div class="loading-msg">Select a subject to begin.</div></div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    var sb = window.supabase.createClient(
      'https://baipckgywpnwapobwtsy.supabase.co',
      'sb_publishable_PYj2nvjclOsUWmZPolhRuA_1OvYhnc2'
    );

    var contentEl = document.getElementById('qa-content');
    var diagramsContentEl = document.getElementById('diagrams-content');
    var subjectSelect = document.getElementById('subject-select');
    var unitSelect = document.getElementById('unit-select');
    var demoUser = null;
    var accessToken = null;
    var activeTab = 'hero';

    // Track loaded state per tab so switching tabs re-fetches if needed
    var heroLoaded = false;
    var diagramsLoaded = false;

    // ---- Tabs ----
    document.querySelectorAll('.qa-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        var target = this.dataset.tab;
        if (target === activeTab) return;

        document.querySelectorAll('.qa-tab').forEach(function (t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });

        this.classList.add('active');
        document.getElementById('panel-' + target).classList.add('active');
        activeTab = target;

        // Reload content for the new tab if a subject is selected
        var slug = subjectSelect.value;
        if (slug) {
          if (target === 'hero' && !heroLoaded) {
            loadUnitsAndLessons(slug);
          } else if (target === 'diagrams' && !diagramsLoaded) {
            loadDiagrams(slug);
          }
        }
      });
    });

    // ---- Auth ----
    async function getAuth() {
      var result = await sb.auth.getSession();
      if (result.data.session) {
        accessToken = result.data.session.access_token;
        return;
      }
      try {
        var stored = localStorage.getItem('studyvault-user');
        if (stored) {
          var u = JSON.parse(stored);
          if (u && u.isDemo) demoUser = u.id;
        }
      } catch (e) {}
    }

    function authHeaders() {
      var h = { 'Content-Type': 'application/json' };
      if (accessToken) h['Authorization'] = 'Bearer ' + accessToken;
      else if (demoUser) h['X-Demo-User'] = demoUser;
      return h;
    }

    // ---- Load subjects ----
    async function loadSubjects() {
      await getAuth();
      var result = await sb.from('subjects').select('id, slug, name').eq('status', 'live').order('name');
      var subjects = result.data || [];
      subjectSelect.innerHTML = '<option value="">Select subject...</option>';
      subjects.forEach(function (s) {
        subjectSelect.innerHTML += '<option value="' + s.slug + '">' + s.name + '</option>';
      });
      // Auto-select from URL params
      var params = new URLSearchParams(window.location.search);
      if (params.get('subject')) {
        subjectSelect.value = params.get('subject');
        subjectSelect.dispatchEvent(new Event('change'));
      }
    }

    subjectSelect.addEventListener('change', async function () {
      var slug = this.value;
      heroLoaded = false;
      diagramsLoaded = false;
      if (!slug) {
        contentEl.innerHTML = '<div class="loading-msg">Select a subject.</div>';
        diagramsContentEl.innerHTML = '<div class="loading-msg">Select a subject.</div>';
        return;
      }
      if (activeTab === 'hero') {
        await loadUnitsAndLessons(slug);
        // Pre-load diagrams in background
        loadDiagrams(slug);
      } else {
        await loadDiagrams(slug);
        // Pre-load hero in background
        loadUnitsAndLessons(slug);
      }
    });

    unitSelect.addEventListener('change', function () {
      if (!subjectSelect.value) return;
      heroLoaded = false;
      diagramsLoaded = false;
      if (activeTab === 'hero') {
        loadUnitsAndLessons(subjectSelect.value);
        loadDiagrams(subjectSelect.value);
      } else {
        loadDiagrams(subjectSelect.value);
        loadUnitsAndLessons(subjectSelect.value);
      }
    });

    // ================================================================
    //  HERO IMAGES TAB
    // ================================================================

    async function loadUnitsAndLessons(subjectSlug) {
      contentEl.innerHTML = '<div class="loading-msg">Loading...</div>';

      var subjectResult = await sb.from('subjects').select('id').eq('slug', subjectSlug).single();
      if (!subjectResult.data) { contentEl.innerHTML = '<div class="loading-msg">Subject not found.</div>'; return; }

      var unitsResult = await sb.from('units').select('id, slug, name, sort_order').eq('subject_id', subjectResult.data.id).order('sort_order');
      var units = unitsResult.data || [];

      // Populate unit dropdown (only from hero tab load or first load)
      if (activeTab === 'hero') {
        unitSelect.innerHTML = '<option value="">All units</option>';
        units.forEach(function (u) {
          unitSelect.innerHTML += '<option value="' + u.slug + '"' + (unitSelect.value === u.slug ? ' selected' : '') + '>' + u.name + '</option>';
        });
        // Auto-select unit from URL params
        var params = new URLSearchParams(window.location.search);
        if (params.get('unit')) {
          unitSelect.value = params.get('unit');
          // Clear params so subsequent changes don't re-trigger
          window.history.replaceState({}, '', window.location.pathname);
        }
      }

      var selectedUnit = unitSelect.value;
      var html = '';

      for (var ui = 0; ui < units.length; ui++) {
        var u = units[ui];
        if (selectedUnit && u.slug !== selectedUnit) continue;

        var lessonsResult = await sb.from('lessons')
          .select('id, lesson_number, title, hero_image_url, hero_image_alt, hero_image_caption, hero_image_position')
          .eq('unit_id', u.id)
          .order('lesson_number');

        var lessons = lessonsResult.data || [];

        for (var li = 0; li < lessons.length; li++) {
          var l = lessons[li];
          var pos = l.hero_image_position || 'center top';
          var yMatch = pos.match(/(\d+)%/);
          var yVal = yMatch ? parseInt(yMatch[1]) : 0;

          html += '<div class="lesson-row" data-lesson-id="' + l.id + '" data-unit-slug="' + u.slug + '">';
          html += '<div class="lesson-row-header"><h3>Lesson ' + l.lesson_number + ': ' + esc(l.title) + '</h3><span class="lesson-num">' + u.name + '</span></div>';
          html += '<div class="lesson-row-body">';

          // Hero preview — wrapped to simulate lesson content column width
          html += '<div class="hero-preview-wrap"><div class="hero-preview" id="preview-' + l.id + '">';
          if (l.hero_image_url) {
            html += '<img src="' + esc(l.hero_image_url) + '" alt="' + esc(l.hero_image_alt || '') + '" style="object-position: ' + pos + ';">';
            html += '<span class="position-label">' + pos + '</span>';
          } else {
            html += '<div class="no-image">No hero image</div>';
          }
          html += '</div></div>';

          // Position slider
          html += '<div class="position-row">';
          html += '<label>Position</label>';
          html += '<input type="range" min="0" max="100" value="' + yVal + '" data-lesson-id="' + l.id + '" class="pos-slider"' + (l.hero_image_url ? '' : ' disabled') + '>';
          html += '<span class="pos-value" id="posval-' + l.id + '">' + yVal + '%</span>';
          html += '</div>';

          // Caption (also used as alt text)
          html += '<div style="margin-bottom:1rem;max-width:804px">';
          html += '<label style="font-size:0.72rem;font-weight:600;display:block;margin-bottom:0.25rem">Caption</label>';
          html += '<input type="text" class="caption-input" id="caption-' + l.id + '" value="' + esc(l.hero_image_caption || l.hero_image_alt || '') + '" placeholder="Describe the image (shown below hero + used for accessibility)" style="width:100%;padding:0.4rem 0.6rem;border:1px solid #ddd;border-radius:6px;font-size:0.78rem;font-family:inherit;box-sizing:border-box">';
          html += '</div>';

          // Candidates area
          html += '<div class="candidates" id="candidates-' + l.id + '"></div>';

          // Action buttons
          html += '<div class="action-row">';
          html += '<button class="btn btn-outline search-btn" data-lesson-id="' + l.id + '" data-title="' + esc(l.title) + '">Search Wikimedia</button>';
          html += '<button class="btn btn-outline unsplash-btn" data-lesson-id="' + l.id + '" data-title="' + esc(l.title) + '">Search Unsplash</button>';
          html += '<input type="text" class="search-input" id="search-' + l.id + '" placeholder="Custom search terms..." value="' + esc(l.title) + '">';
          html += '<label class="btn btn-outline upload-label" data-lesson-id="' + l.id + '">Upload Image<input type="file" accept="image/*" class="upload-input" data-lesson-id="' + l.id + '" style="display:none"></label>';
          html += '<button class="btn btn-success save-btn" data-lesson-id="' + l.id + '">Save</button>';
          if (l.hero_image_url) {
            html += '<button class="btn btn-danger remove-btn" data-lesson-id="' + l.id + '">Remove</button>';
          }
          html += '<span class="save-toast" id="toast-' + l.id + '">Saved!</span>';
          html += '</div>';

          html += '</div></div>';
        }
      }

      contentEl.innerHTML = html;
      heroLoaded = true;
      wireUpHeroEvents();
    }

    // ---- Wire up hero interactive events ----
    function wireUpHeroEvents() {
      // Position sliders
      document.querySelectorAll('#panel-hero .pos-slider').forEach(function (slider) {
        slider.addEventListener('input', function () {
          var id = this.dataset.lessonId;
          var val = this.value;
          document.getElementById('posval-' + id).textContent = val + '%';
          var img = document.querySelector('#preview-' + id + ' img');
          if (img) {
            img.style.objectPosition = 'center ' + val + '%';
            var label = document.querySelector('#preview-' + id + ' .position-label');
            if (label) label.textContent = 'center ' + val + '%';
          }
        });
      });

      // Drag to position on preview
      document.querySelectorAll('#panel-hero .hero-preview').forEach(function (preview) {
        var isDragging = false;
        var startY, startPos;

        preview.addEventListener('mousedown', function (e) {
          var img = preview.querySelector('img');
          if (!img) return;
          isDragging = true;
          startY = e.clientY;
          var match = (img.style.objectPosition || 'center 50%').match(/(\d+)%/);
          startPos = match ? parseInt(match[1]) : 50;
          e.preventDefault();
        });

        document.addEventListener('mousemove', function (e) {
          if (!isDragging) return;
          var delta = startY - e.clientY;
          var newPos = Math.max(0, Math.min(100, startPos + delta * 0.5));
          var img = preview.querySelector('img');
          if (img) {
            img.style.objectPosition = 'center ' + Math.round(newPos) + '%';
            var label = preview.querySelector('.position-label');
            if (label) label.textContent = 'center ' + Math.round(newPos) + '%';
          }
          var id = preview.id.replace('preview-', '');
          var slider = document.querySelector('.pos-slider[data-lesson-id="' + id + '"]');
          if (slider) { slider.value = Math.round(newPos); }
          document.getElementById('posval-' + id).textContent = Math.round(newPos) + '%';
        });

        document.addEventListener('mouseup', function () { isDragging = false; });
      });

      // Upload buttons
      document.querySelectorAll('#panel-hero .upload-input').forEach(function (input) {
        input.addEventListener('change', function () {
          if (this.files.length) {
            uploadImage(this.dataset.lessonId, this.files[0]);
          }
        });
      });

      // Search buttons
      document.querySelectorAll('#panel-hero .search-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = this.dataset.lessonId;
          var searchInput = document.getElementById('search-' + id);
          var query = searchInput ? searchInput.value : this.dataset.title;
          searchWikimedia(id, query);
        });
      });

      // Unsplash search buttons
      document.querySelectorAll('#panel-hero .unsplash-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = this.dataset.lessonId;
          var searchInput = document.getElementById('search-' + id);
          var query = searchInput ? searchInput.value : this.dataset.title;
          searchUnsplash(id, query);
        });
      });

      // Save buttons
      document.querySelectorAll('#panel-hero .save-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          savePosition(this.dataset.lessonId);
        });
      });

      // Remove buttons
      document.querySelectorAll('#panel-hero .remove-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          removeHero(this.dataset.lessonId);
        });
      });
    }

    // ---- Search Wikimedia Commons ----
    async function searchWikimedia(lessonId, query) {
      var container = document.getElementById('candidates-' + lessonId);
      container.innerHTML = '<span style="font-size:0.78rem;color:var(--text-muted)">Searching...</span>';

      try {
        var url = 'https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=' +
          encodeURIComponent(query + ' filetype:bitmap') +
          '&srnamespace=6&srlimit=8&format=json&origin=*';

        var resp = await fetch(url);
        var data = await resp.json();
        var results = (data.query && data.query.search) || [];

        if (results.length === 0) {
          container.innerHTML = '<span style="font-size:0.78rem;color:var(--text-muted)">No results. Try different search terms.</span>';
          return;
        }

        // Get thumbnail URLs for each result
        var titles = results.map(function (r) { return r.title; }).join('|');
        var infoUrl = 'https://commons.wikimedia.org/w/api.php?action=query&titles=' +
          encodeURIComponent(titles) +
          '&prop=imageinfo&iiprop=url|mime|size&iiurlwidth=400&format=json&origin=*';

        var infoResp = await fetch(infoUrl);
        var infoData = await infoResp.json();
        var pages = infoData.query.pages;

        var html = '';
        var count = 0;
        for (var pid in pages) {
          var page = pages[pid];
          var ii = page.imageinfo && page.imageinfo[0];
          if (!ii || !ii.mime || !ii.mime.startsWith('image/jpeg')) continue;
          if (ii.size < 50000) continue;
          if (ii.width < ii.height) continue; // landscape only

          var thumbUrl = ii.thumburl || ii.url;
          var fullUrl = ii.url;
          html += '<div class="candidate" data-lesson-id="' + lessonId + '" data-url="' + esc(fullUrl) + '" data-thumb="' + esc(thumbUrl) + '" data-title="' + esc(page.title.replace('File:', '')) + '">';
          html += '<img src="' + esc(thumbUrl) + '" alt="candidate" loading="lazy">';
          html += '<span class="badge">' + (count + 1) + '</span>';
          html += '</div>';
          count++;
          if (count >= 4) break;
        }

        if (count === 0) {
          container.innerHTML = '<span style="font-size:0.78rem;color:var(--text-muted)">No suitable landscape JPEG images found. Try different terms.</span>';
          return;
        }

        container.innerHTML = html;

        // Wire click to select
        container.querySelectorAll('.candidate').forEach(function (cand) {
          cand.addEventListener('click', function () {
            selectCandidate(this);
          });
        });
      } catch (err) {
        container.innerHTML = '<span style="font-size:0.78rem;color:#dc2626">Search failed: ' + err.message + '</span>';
      }
    }

    // ---- Search Unsplash ----
    async function searchUnsplash(lessonId, query) {
      var container = document.getElementById('candidates-' + lessonId);
      container.innerHTML = '<span style="font-size:0.78rem;color:var(--text-muted)">Searching Unsplash...</span>';

      try {
        var resp = await fetch('/api/pipeline/search-unsplash?q=' + encodeURIComponent(query), {
          headers: authHeaders(),
        });
        var data = await resp.json();

        if (!resp.ok) throw new Error(data.error || 'Search failed');

        var results = data.results || [];
        if (results.length === 0) {
          container.innerHTML = '<span style="font-size:0.78rem;color:var(--text-muted)">No Unsplash results. Try different search terms.</span>';
          return;
        }

        var html = '';
        for (var i = 0; i < Math.min(results.length, 4); i++) {
          var r = results[i];
          var caption = r.title ? (r.title + ' — Photo by ' + r.photographer + ' on Unsplash') : ('Photo by ' + r.photographer + ' on Unsplash');
          html += '<div class="candidate" data-lesson-id="' + lessonId + '" data-url="' + esc(r.url) + '" data-thumb="' + esc(r.thumb) + '" data-title="' + esc(caption) + '">';
          html += '<img src="' + esc(r.thumb) + '" alt="candidate" loading="lazy">';
          html += '<span class="badge">U' + (i + 1) + '</span>';
          html += '</div>';
        }

        container.innerHTML = html;

        // Wire click to select
        container.querySelectorAll('.candidate').forEach(function (cand) {
          cand.addEventListener('click', function () {
            selectCandidate(this);
          });
        });
      } catch (err) {
        container.innerHTML = '<span style="font-size:0.78rem;color:#dc2626">Unsplash search failed: ' + err.message + '</span>';
      }
    }

    // ---- Upload a local image ----
    async function uploadImage(lessonId, file) {
      var preview = document.getElementById('preview-' + lessonId);
      preview.innerHTML = '<div class="no-image">Uploading...</div>';

      try {
        // Upload to Supabase Storage (pipeline-uploads bucket, reused for hero images)
        var path = 'hero-uploads/' + lessonId + '/' + file.name;
        var uploadResult = await sb.storage.from('pipeline-uploads').upload(path, file, { upsert: true });
        if (uploadResult.error) throw new Error(uploadResult.error.message);

        // Get the public URL
        var urlResult = sb.storage.from('pipeline-uploads').getPublicUrl(path);
        var publicUrl = urlResult.data.publicUrl;

        // Show in preview
        preview.innerHTML = '<img src="' + publicUrl + '" alt="' + esc(file.name) + '" style="object-position: center 50%;">' +
          '<span class="position-label">center 50%</span>';

        // Enable slider
        var slider = document.querySelector('.pos-slider[data-lesson-id="' + lessonId + '"]');
        if (slider) { slider.disabled = false; slider.value = 50; }
        document.getElementById('posval-' + lessonId).textContent = '50%';

        // Store for saving
        preview.dataset.pendingUrl = publicUrl;
        preview.dataset.pendingAlt = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
      } catch (err) {
        preview.innerHTML = '<div class="no-image" style="color:#dc2626">Upload failed: ' + err.message + '</div>';
      }
    }

    // ---- Select a candidate image ----
    function selectCandidate(el) {
      var lessonId = el.dataset.lessonId;
      var url = el.dataset.url;
      var title = el.dataset.title;

      // Highlight selected
      el.parentNode.querySelectorAll('.candidate').forEach(function (c) { c.classList.remove('selected'); });
      el.classList.add('selected');

      // Update preview
      var preview = document.getElementById('preview-' + lessonId);
      preview.innerHTML = '<img src="' + url + '" alt="' + esc(title) + '" style="object-position: center 50%;">' +
        '<span class="position-label">center 50%</span>';

      // Enable slider
      var slider = document.querySelector('.pos-slider[data-lesson-id="' + lessonId + '"]');
      if (slider) { slider.disabled = false; slider.value = 50; }
      document.getElementById('posval-' + lessonId).textContent = '50%';

      // Store the URL for saving
      preview.dataset.pendingUrl = url;
      preview.dataset.pendingAlt = title;

      // Update caption field to match
      var captionEl = document.getElementById('caption-' + lessonId);
      if (captionEl) captionEl.value = title;
    }

    // ---- Save position (and new image if selected) ----
    async function savePosition(lessonId) {
      var preview = document.getElementById('preview-' + lessonId);
      var slider = document.querySelector('.pos-slider[data-lesson-id="' + lessonId + '"]');
      var posValue = 'center ' + (slider ? slider.value : 50) + '%';

      // Caption field doubles as alt text
      var captionEl = document.getElementById('caption-' + lessonId);
      var captionVal = captionEl ? captionEl.value : '';

      var body = {
        lesson_id: lessonId,
        hero_image_position: posValue,
        hero_image_caption: captionVal,
        hero_image_alt: captionVal,
      };

      // If a new candidate was selected
      if (preview.dataset.pendingUrl) {
        body.hero_image_url = preview.dataset.pendingUrl;
        if (!body.hero_image_alt) body.hero_image_alt = preview.dataset.pendingAlt || '';
        if (!body.hero_image_caption) body.hero_image_caption = preview.dataset.pendingAlt || '';
        delete preview.dataset.pendingUrl;
        delete preview.dataset.pendingAlt;
      }

      try {
        var resp = await fetch('/api/pipeline/update-hero', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(body),
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Save failed');

        var toast = document.getElementById('toast-' + lessonId);
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 2000);
      } catch (err) {
        alert('Save failed: ' + err.message);
      }
    }

    // ---- Remove hero image ----
    async function removeHero(lessonId) {
      try {
        var resp = await fetch('/api/pipeline/update-hero', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            lesson_id: lessonId,
            hero_image_url: null,
            hero_image_alt: null,
            hero_image_caption: null,
          }),
        });
        if (!resp.ok) throw new Error('Remove failed');

        var preview = document.getElementById('preview-' + lessonId);
        preview.innerHTML = '<div class="no-image">No hero image</div>';
        var slider = document.querySelector('.pos-slider[data-lesson-id="' + lessonId + '"]');
        if (slider) slider.disabled = true;

        var toast = document.getElementById('toast-' + lessonId);
        toast.textContent = 'Removed!';
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); toast.textContent = 'Saved!'; }, 2000);
      } catch (err) {
        alert('Remove failed: ' + err.message);
      }
    }

    // ================================================================
    //  DIAGRAMS TAB
    // ================================================================

    async function loadDiagrams(subjectSlug) {
      diagramsContentEl.innerHTML = '<div class="loading-msg">Loading diagrams...</div>';

      var subjectResult = await sb.from('subjects').select('id').eq('slug', subjectSlug).single();
      if (!subjectResult.data) { diagramsContentEl.innerHTML = '<div class="loading-msg">Subject not found.</div>'; return; }

      var unitsResult = await sb.from('units').select('id, slug, name, sort_order').eq('subject_id', subjectResult.data.id).order('sort_order');
      var units = unitsResult.data || [];

      // Populate unit dropdown if diagrams tab triggered the load
      if (activeTab === 'diagrams') {
        var currentUnit = unitSelect.value;
        unitSelect.innerHTML = '<option value="">All units</option>';
        units.forEach(function (u) {
          unitSelect.innerHTML += '<option value="' + u.slug + '"' + (currentUnit === u.slug ? ' selected' : '') + '>' + u.name + '</option>';
        });
      }

      var selectedUnit = unitSelect.value;
      var html = '';
      var totalDiagrams = 0;

      for (var ui = 0; ui < units.length; ui++) {
        var u = units[ui];
        if (selectedUnit && u.slug !== selectedUnit) continue;

        var lessonsResult = await sb.from('lessons')
          .select('id, lesson_number, title, content_html, diagrams')
          .eq('unit_id', u.id)
          .order('lesson_number');

        var lessons = lessonsResult.data || [];

        for (var li = 0; li < lessons.length; li++) {
          var l = lessons[li];
          var diagrams = l.diagrams || [];
          var diagramCount = diagrams.length;
          totalDiagrams += diagramCount;

          // Content preview — strip HTML tags and truncate
          var plainText = (l.content_html || '').replace(/<[^>]+>/g, '').substring(0, 200);

          html += '<div class="lesson-row" data-lesson-id="' + l.id + '">';
          html += '<div class="lesson-row-header">';
          html += '<h3>Lesson ' + l.lesson_number + ': ' + esc(l.title);
          html += '<span class="diagram-count">' + diagramCount + ' diagram' + (diagramCount !== 1 ? 's' : '') + '</span>';
          html += '</h3>';
          html += '<span class="lesson-num">' + u.name + '</span>';
          html += '</div>';
          html += '<div class="lesson-row-body">';

          // Content context
          if (plainText) {
            html += '<div class="diagram-context"><strong>Context:</strong> ' + esc(plainText) + (plainText.length >= 200 ? '...' : '') + '</div>';
          }

          // Show each existing diagram
          if (diagramCount > 0) {
            for (var di = 0; di < diagrams.length; di++) {
              var d = diagrams[di];
              html += '<div class="diagram-preview" id="diag-preview-' + l.id + '-' + di + '">';
              html += '<img src="' + esc(d.url) + '" alt="' + esc(d.alt || 'Diagram ' + (di + 1)) + '" loading="lazy">';
              html += '</div>';
              if (d.alt) {
                html += '<p style="font-size:0.75rem;color:var(--text-muted);margin:0.25rem 0 1rem;">' + esc(d.alt) + '</p>';
              }
            }
          } else {
            html += '<div class="diagram-preview"><div class="no-image">No diagrams for this lesson</div></div>';
          }

          // Regeneration prompt area
          html += '<div class="diagram-prompt-area">';
          html += '<label>Gemini Prompt</label>';
          html += '<textarea id="diag-prompt-' + l.id + '" placeholder="Enter a prompt for Gemini diagram generation...">';
          // Pre-fill with a sensible default prompt
          html += esc('Create a clear, educational infographic diagram for a GCSE lesson titled "' + l.title + '". Use pictorial isotype icons. The diagram should be visually engaging and suitable for 15-16 year old students.');
          html += '</textarea>';
          html += '</div>';

          // Iterate checkbox + action buttons
          var hasDiagram = diagrams && diagrams.length > 0;
          html += '<div class="action-row" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">';
          if (hasDiagram) {
            html += '<label style="font-size:0.78rem;display:flex;align-items:center;gap:0.35rem;cursor:pointer"><input type="checkbox" id="diag-iterate-' + l.id + '" checked> Iterate on current image</label>';
          }
          html += '<button class="btn btn-primary diag-generate-btn" data-lesson-id="' + l.id + '">' + (hasDiagram ? 'Regenerate' : 'Generate') + ' with Gemini</button>';
          html += '<span class="save-toast" id="diag-toast-' + l.id + '">Saved!</span>';
          html += '</div>';

          // Status area
          html += '<div class="diagram-status" id="diag-status-' + l.id + '"></div>';

          // Result area (for new generation)
          html += '<div class="diagram-result" id="diag-result-' + l.id + '" style="display:none;"></div>';

          html += '</div></div>';
        }
      }

      if (!html) {
        html = '<div class="loading-msg">No lessons found.</div>';
      }

      diagramsContentEl.innerHTML = html;
      diagramsLoaded = true;
      wireUpDiagramEvents();
    }

    function wireUpDiagramEvents() {
      document.querySelectorAll('#panel-diagrams .diag-generate-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var lessonId = this.dataset.lessonId;
          generateDiagram(lessonId);
        });
      });
    }

    async function generateDiagram(lessonId) {
      var btn = document.querySelector('.diag-generate-btn[data-lesson-id="' + lessonId + '"]');
      var statusEl = document.getElementById('diag-status-' + lessonId);
      var resultEl = document.getElementById('diag-result-' + lessonId);
      var promptEl = document.getElementById('diag-prompt-' + lessonId);
      var prompt = promptEl.value.trim();

      if (!prompt) {
        statusEl.className = 'diagram-status error';
        statusEl.textContent = 'Please enter a prompt before generating.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Generating...';
      statusEl.className = 'diagram-status working';
      statusEl.textContent = 'Sending to Gemini API... This may take 15-30 seconds.';
      resultEl.style.display = 'none';

      var iterateEl = document.getElementById('diag-iterate-' + lessonId);
      var iterate = iterateEl ? iterateEl.checked : false;

      try {
        var resp = await fetch('/api/pipeline/regenerate-diagram', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            lesson_id: lessonId,
            prompt: prompt,
            iterate: iterate,
          }),
        });

        var data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error || 'Generation failed');
        }

        // Show the result
        resultEl.innerHTML = '<img src="' + esc(data.diagram_url) + '" alt="Generated diagram">';
        resultEl.style.display = 'block';

        statusEl.className = 'diagram-status success';
        statusEl.textContent = 'Diagram generated and saved successfully.';

        // Update the existing preview if there was one
        var firstPreview = document.getElementById('diag-preview-' + lessonId + '-0');
        if (firstPreview) {
          firstPreview.innerHTML = '<img src="' + esc(data.diagram_url) + '" alt="Updated diagram" loading="lazy">';
        }

        var toast = document.getElementById('diag-toast-' + lessonId);
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 2000);
      } catch (err) {
        statusEl.className = 'diagram-status error';
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate with Gemini';
      }
    }

    // ---- Utility ----
    function esc(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // ---- Init ----
    loadSubjects();
  })();
  </script>
