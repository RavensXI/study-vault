    <p style="text-align:center;color:#6b6560;font-size:0.95rem;margin-top:0.25rem;">Student Dashboard Demo</p>
  </section>

  <!-- ===== DASHBOARD ===== -->
  <section id="dashboard" class="dashboard">
    <div class="dashboard-greeting-row" id="dashboard-greeting-row"></div>
    <div class="dashboard-today" id="dashboard-today"></div>
    <div class="dashboard-stats" id="dashboard-stats"></div>
    <div class="dashboard-actions" id="dashboard-actions-row">
      <a href="/" class="dashboard-action-btn">Back to home</a>
    </div>
    <div id="subject-grid" class="subject-grid"></div>
  </section>

  <footer style="text-align: center; padding: 2rem 1.5rem 3rem; font-size: 0.82rem; color: var(--text-muted);">
    &copy; 2026 StudyVault. Student dashboard demo for SLT presentations.
  </footer>

  <script>
  (function () {
    /* Demo user data (hardcoded — this page is purely for SLT demos) */
    var demoUser = {
      name: 'Emma Wilson',
      examDate: '2026-05-11',
      stats: { avgScore: 74, streak: 5, perSubject: { 'history': 8, 'business': 4, 'geography': 5, 'sport-science': 3, 'drama': 2, 'food-technology': 1, 'religious-studies': 6 } },
      todayRevision: [
        { subject: 'History', lesson: 'The Abyssinia Crisis', tag: 'new', color: '#c44536', url: '/lesson/history/conflict-tension/9' },
        { subject: 'Business', lesson: 'Enterprise &amp; New Business Ideas', tag: 'new', color: '#0891b2', url: '/lesson/business/theme-1/1' },
        { subject: 'Geography', lesson: 'Urban Challenges in the UK', tag: 'revisit', color: '#dc2626', url: '/lesson/geography/paper-2/6' },
        { subject: 'Food Technology', lesson: 'Nutrients &amp; Their Functions', tag: 'new', color: '#0d9488', url: '/lesson/food-technology/nutrition-health/1' }
      ]
    };

    var subjects = [
      { id: 'history', name: 'History', board: 'AQA', color: '#c44536', url: '/browse/history', detail: '4 units, 60 lessons', totalLessons: 60 },
      { id: 'business', name: 'Business', board: 'Pearson Edexcel', color: '#0891b2', url: '/browse/business', detail: '2 themes, 30 lessons', totalLessons: 30 },
      { id: 'geography', name: 'Geography', board: 'AQA', color: '#059669', url: '/browse/geography', detail: '2 papers, 40 lessons', totalLessons: 40 },
      { id: 'sport-science', name: 'Sport Science', board: 'OCR', color: '#ea580c', url: '/browse/sport-science', detail: '1 unit, 10 lessons', totalLessons: 10 },
      { id: 'drama', name: 'Drama', board: 'OCR', color: '#7c3aed', url: '/browse/drama', detail: '2 units, 12 lessons', totalLessons: 12 },
      { id: 'food-technology', name: 'Food Preparation &amp; Nutrition', board: 'AQA', color: '#0d9488', url: '/browse/food-technology', detail: '1 unit, 10 lessons', totalLessons: 10 },
      { id: 'religious-studies', name: 'Religious Studies', board: 'AQA', color: '#1e40af', url: '/browse/religious-education', detail: '8 units, 40 lessons', totalLessons: 40 },
      { id: 'music', name: 'Music', board: 'Eduqas (WJEC)', color: '#9333ea', url: '/browse/gcse-music', detail: '6 units, 26 lessons', totalLessons: 26 }
    ];

    function getGreeting() {
      var h = new Date().getHours();
      if (h < 12) return 'Good morning';
      if (h < 18) return 'Good afternoon';
      return 'Good evening';
    }

    function daysUntil(dateStr) {
      var target = new Date(dateStr + 'T00:00:00');
      var now = new Date(); now.setHours(0,0,0,0);
      var diff = Math.ceil((target - now) / 86400000);
      return diff > 0 ? diff : 0;
    }

    /* Greeting + countdown */
    var days = daysUntil(demoUser.examDate);
    document.getElementById('dashboard-greeting-row').innerHTML =
      '<div class="dashboard-greeting">' +
        '<h2 class="greeting-text">' + getGreeting() + ', Emma</h2>' +
        '<span class="dashboard-countdown">' + days + ' day' + (days !== 1 ? 's' : '') + ' until your first exam</span>' +
      '</div>';

    /* Today's revision */
    var th = '<div class="dashboard-today-inner"><h3 class="dashboard-section-title">Today\u2019s Revision</h3><div class="today-cards">';
    demoUser.todayRevision.forEach(function (item) {
      th += '<a href="' + item.url + '" class="today-card" style="--today-accent:' + item.color + '">';
      th += '<div class="today-card-subject">' + item.subject + '</div>';
      th += '<div class="today-card-lesson">' + item.lesson + '</div>';
      th += '<span class="today-tag today-tag--' + item.tag + '">' + (item.tag === 'new' ? 'New' : 'Revisit') + '</span>';
      th += '</a>';
    });
    th += '</div></div>';
    document.getElementById('dashboard-today').innerHTML = th;

    /* Stats */
    var s = demoUser.stats;
    var totalDone = 0, totalAvail = 0;
    subjects.forEach(function (sub) {
      totalDone += (s.perSubject[sub.id] || 0);
      totalAvail += sub.totalLessons;
    });
    var pct = totalAvail ? Math.round((totalDone / totalAvail) * 100) : 0;
    var scoreClass = s.avgScore >= 70 ? 'stat-good' : (s.avgScore >= 50 ? 'stat-ok' : 'stat-low');
    var sh = '<div class="dashboard-stats-inner">';
    sh += '<div class="stat-card"><div class="stat-value">' + totalDone + ' <span class="stat-total">/ ' + totalAvail + '</span></div><div class="stat-label">Lessons completed</div><div class="stat-bar"><div class="stat-bar-fill" style="width:' + pct + '%"></div></div></div>';
    sh += '<div class="stat-card"><div class="stat-value ' + scoreClass + '">' + s.avgScore + '%</div><div class="stat-label">Avg quiz score</div></div>';
    sh += '<div class="stat-card"><div class="stat-value">' + s.streak + ' days</div><div class="stat-label">Best streak</div></div>';
    sh += '</div>';
    document.getElementById('dashboard-stats').innerHTML = sh;

    /* Subject cards */
    var html = '';
    subjects.forEach(function (sub) {
      var done = s.perSubject[sub.id] || 0;
      var pctS = Math.round((done / sub.totalLessons) * 100);
      html += '<a href="' + sub.url + '" class="subject-card" style="--card-accent:' + sub.color + '">';
      html += '<div class="unit-card-body"><h2>' + sub.name + '</h2>';
      html += '<p class="unit-subtitle">' + sub.board + ' \u2014 ' + sub.detail + '</p>';
      html += '<div class="subject-progress"><div class="subject-progress-bar"><div class="subject-progress-fill" style="width:' + pctS + '%"></div></div>';
      html += '<span class="subject-progress-label">' + done + ' / ' + sub.totalLessons + ' lessons</span></div>';
      html += '</div></a>';
    });
    document.getElementById('subject-grid').innerHTML = html;
  })();
  </script>
</body>
</html>
